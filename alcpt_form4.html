<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALCPT Form 4</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f2744;
    --navy-mid: #1a3a5c;
    --blue: #2563a8;
    --accent: #e8a020;
    --accent-light: #fdf3dc;
    --green: #1a7a4a;
    --green-light: #e8f7ef;
    --red: #b91c1c;
    --gray-100: #f4f6f9;
    --gray-200: #e5e9f0;
    --gray-400: #94a3b8;
    --gray-600: #4a5568;
    --gray-800: #1e293b;
    --white: #ffffff;
    --radius: 8px;
    --shadow: 0 2px 12px rgba(15,39,68,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--gray-100); color: var(--gray-800); }

  /* ── STICKY PLAYER ── */
  .player-bar {
    position: sticky;
    top: 0;
    z-index: 200;
    background: var(--navy);
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
    padding: 12px 24px;
  }
  .player-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .player-title {
    font-family: 'DM Serif Display', serif;
    color: var(--white);
    font-size: 1rem;
    white-space: nowrap;
  }
  .player-title span { color: var(--accent); }

  .player-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }
  .btn-playpause {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: var(--navy);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-playpause:hover { background: #d4911a; transform: scale(1.05); }
  .btn-playpause svg { width: 18px; height: 18px; fill: var(--navy); }

  .progress-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    position: relative;
    cursor: default;
  }
  .progress-played {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s linear;
    pointer-events: none;
  }
  .player-time {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .player-status {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }

  
  .upload-label:hover { background: rgba(255,255,255,0.18); }
  .upload-label input { display: none; }

  /* ── MAIN ── */
  .main {
    max-width: 800px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* ── PART HEADER ── */
  .part-header {
    margin: 32px 0 14px;
    padding: 10px 16px;
    background: var(--navy-mid);
    border-radius: var(--radius);
    color: var(--white);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    border-left: 4px solid var(--accent);
  }
  .part-header:first-child { margin-top: 0; }

  /* ── QUESTION ── */
  .q-row {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 8px;
    border-left: 3px solid var(--gray-200);
    transition: border-color 0.15s;
  }
  .q-row:focus-within { border-left-color: var(--blue); }

  .q-inner {
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 0;
  }
  .q-num {
    padding: 14px 0 14px 14px;
    font-weight: 700;
    font-size: 0.78rem;
    color: var(--gray-400);
    line-height: 1.6;
  }
  .q-body { padding: 14px 16px 14px 0; }
  .q-stem {
    font-size: 0.9rem;
    line-height: 1.55;
    color: var(--gray-800);
    margin-bottom: 10px;
  }
  .q-stem strong { color: var(--navy); }

  /* For audio questions — no stem shown, just options */
  .q-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .q-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1.5px solid var(--gray-200);
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--gray-700);
    transition: border-color 0.12s, background 0.12s;
    user-select: none;
  }
  .q-option:hover { border-color: var(--blue); background: #f0f6ff; }
  .q-option input[type=radio] { display: none; }
  .q-option.chosen { border-color: var(--blue); background: #eef5ff; }
  .q-option.chosen .opt-letter { background: var(--blue); color: var(--white); }
  .opt-letter {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--gray-200);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.7rem;
    color: var(--gray-600);
    flex-shrink: 0;
    transition: background 0.12s, color 0.12s;
  }

  /* ── RESULTS (hidden until submit) ── */
  .q-row.show-result.correct { border-left-color: var(--green); }
  .q-row.show-result.wrong { border-left-color: var(--red); }
  .q-option.show-correct { border-color: var(--green); background: var(--green-light); }
  .q-option.show-correct .opt-letter { background: var(--green); color: var(--white); }
  .q-option.show-wrong { border-color: var(--red); background: #fef2f2; }
  .q-option.show-wrong .opt-letter { background: var(--red); color: var(--white); }
  .q-explanation {
    display: none;
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--gray-100);
    border-radius: 6px;
    font-size: 0.8rem;
    line-height: 1.6;
    color: var(--gray-600);
    border-top: 1px solid var(--gray-200);
  }
  .q-explanation .cz-ex { color: var(--blue); font-weight: 600; display: block; margin-top: 3px; }
  .show-result .q-explanation { display: block; }

  /* ── SUBMIT / SCORE ── */
  .submit-area {
    text-align: center;
    margin-top: 36px;
  }
  .answered-info {
    font-size: 0.82rem;
    color: var(--gray-400);
    margin-bottom: 14px;
  }
  .btn-submit {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 13px 36px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--navy);
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .btn-submit:hover { background: #d4911a; transform: translateY(-1px); }

  .score-banner {
    display: none;
    background: var(--navy);
    color: var(--white);
    border-radius: 12px;
    padding: 28px 32px;
    margin-bottom: 28px;
    text-align: center;
  }
  .score-banner .big {
    font-family: 'DM Serif Display', serif;
    font-size: 3.5rem;
    color: var(--accent);
    line-height: 1;
  }
  .score-banner .big span { font-size: 1.6rem; color: rgba(255,255,255,0.4); }
  .score-banner .sub { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 6px; }
  .score-parts {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .score-part .val { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--white); }
  .score-part .lbl { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.4); }

  .btn-retry {
    margin-top: 16px;
    background: none;
    border: 2px solid var(--navy);
    border-radius: var(--radius);
    padding: 10px 24px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--navy);
    transition: all 0.15s;
  }
  .btn-retry:hover { background: var(--navy); color: var(--white); }

  @media (max-width: 560px) {
    .q-options { grid-template-columns: 1fr; }
    .player-title { display: none; }
  }
</style>
</head>
<body>

<!-- ── STICKY PLAYER ── -->
<div class="player-bar">
  <div class="player-inner">
    <div class="player-title">ALCPT <span>Form 4</span></div>
    <div class="player-controls">
      <button class="btn-playpause" id="btnPlay" onclick="togglePlay()" title="Play / Pause">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <div class="progress-track">
        <div class="progress-played" id="progressPlayed"></div>
      </div>
      <div class="player-time" id="playerTime">0:00 / 0:00</div>
      <div class="player-status" id="playerStatus">Připraveno</div>
    </div>
    
  </div>
</div>

<div class="main" id="mainContent">
  <!-- score banner (shown after submit) -->
  <div class="score-banner" id="scoreBanner">
    <div class="big" id="scoreBig"></div>
    <div class="sub" id="scoreSub"></div>
    <div class="score-parts" id="scoreParts"></div>
    <button class="btn-retry" onclick="retryTest()">Zkusit znovu</button>
  </div>
  <!-- questions injected here -->
</div>

<div class="submit-area" id="submitArea">
  <div class="answered-info" id="answeredInfo">0 / 100 zodpovězeno</div>
  <button class="btn-submit" id="btnSubmit" onclick="trySubmit()">Odeslat test ✓</button>
</div>

<audio id="audioEl" src="ALCPT04.MP3"></audio>

<script>

const questions = [{"id": 1, "part": "I", "options": ["Wednesday", "Tuesday", "Thursday", "Friday"], "correct": 0, "transcript": "John goes to the park on Wednesday of every week. When does he go to the park?", "czTranscript": "John chodí do parku každou středu. Kdy chodí?", "expl": "'On Wednesday of every week' = každou středu → správná odpověď: a. Wednesday.", "distractors": ["B. Tuesday — Úterý – věta říká středu.", "C. Thursday — Čtvrtek – věta říká středu.", "D. Friday — Pátek – věta říká středu."]}, {"id": 2, "part": "I", "options": ["April", "June", "August", "September"], "correct": 2, "transcript": "What month comes right after July?", "czTranscript": "Který měsíc přichází těsně po červenci?", "expl": "'Right after July' = hned po červenci = srpen → správná odpověď: c. August.", "distractors": ["A. April — Duben – je tři měsíce PŘED červencem.", "B. June — Červen – přichází těsně PŘED červencem.", "D. September — Září – je dva měsíce po červenci."]}, {"id": 3, "part": "I", "options": ["Asia", "Mexico", "Europe", "South America"], "correct": 1, "transcript": "What country is located south of the United States?", "czTranscript": "Která země leží jižně od USA?", "expl": "Jižně od USA leží Mexiko → správná odpověď: b. Mexico.", "distractors": ["A. Asia — Na druhém kontinentu.", "C. Europe — Přes Atlantický oceán.", "D. South America — Jižní Amerika leží jižně, ale Mexiko je přímý soused."]}, {"id": 4, "part": "I", "options": ["31 days", "New Year's", "12 months", "December"], "correct": 3, "transcript": "What is the name of the last month of the year?", "czTranscript": "Jak se jmenuje poslední měsíc roku?", "expl": "Poslední měsíc roku je prosinec → správná odpověď: d. December.", "distractors": ["A. 31 days — Popisuje délku měsíce, ne jeho název.", "B. New Year's — Svátek, ne název měsíce.", "C. 12 months — Počet měsíců v roce, ne název posledního."]}, {"id": 5, "part": "I", "options": ["erase it", "answer it", "translate it", "copy it"], "correct": 1, "transcript": "If the teacher asks a question, what should you do?", "czTranscript": "Pokud se učitel zeptá, co byste měli udělat?", "expl": "Když se učitel zeptá, správná reakce je odpovědět → správná odpověď: b. answer it.", "distractors": ["A. erase it — Otázku se nevymazává.", "C. translate it — Překlad není standardní reakce.", "D. copy it — Opisování otázky není odpovědí."]}, {"id": 6, "part": "I", "options": ["certain men", "one man", "no men", "all men"], "correct": 3, "transcript": "Every man should read this book. Who should read this book?", "czTranscript": "Každý muž by měl číst tuto knihu. Kdo by ji měl číst?", "expl": "'Every man' = každý muž = všichni muži → správná odpověď: d. all men.", "distractors": ["A. certain men — 'Every' = každý = všichni, ne jen někteří.", "B. one man — 'Every man' zahrnuje všechny.", "C. no men — Přímý opak: 'every man' = všichni."]}, {"id": 7, "part": "I", "options": ["take a rest", "bring his plane down", "take off", "fly faster"], "correct": 1, "transcript": "The pilot can land now. What can the pilot do?", "czTranscript": "Pilot teď může přistát. Co může udělat?", "expl": "'Land' = přistát = přivést letadlo dolů → správná odpověď: b. bring his plane down.", "distractors": ["A. take a rest — 'Land' znamená přistát, ne odpočívat.", "C. take off — Přímý opak přistání.", "D. fly faster — Přistávání znamená zpomalení."]}, {"id": 8, "part": "I", "options": ["the day after tomorrow", "the day before yesterday", "Thursday", "on Saturday"], "correct": 3, "transcript": "Today is Friday. I will see Mary tomorrow. When will I see Mary?", "czTranscript": "Dnes je pátek. Zítra uvidím Mary. Kdy ji uvidím?", "expl": "Zítra po pátku (Friday) je sobota → správná odpověď: d. on Saturday.", "distractors": ["A. the day after tomorrow — To by byla neděle.", "B. the day before yesterday — Minulost, věta říká zítra.", "C. Thursday — To byl včera."]}, {"id": 9, "part": "I", "options": ["The sky was clear.", "The weather was bad.", "The sky was covered with clouds.", "The wind was blowing."], "correct": 0, "transcript": "The sun was shining and the sky was clear. How was the sky?", "czTranscript": "Slunce svítilo a obloha byla jasná. Jaká byla obloha?", "expl": "'The sky was clear' = obloha byla jasná → správná odpověď: a. The sky was clear.", "distractors": ["B. The weather was bad. — Věta říká, že slunce svítilo.", "C. The sky was covered with clouds. — Opak: 'sky was clear'.", "D. The wind was blowing. — Vítr není zmíněn."]}, {"id": 10, "part": "I", "options": ["solves math problems", "draws maps", "reads electronics diagrams", "looks up words"], "correct": 3, "transcript": "Edward often uses the dictionary. What does Edward do?", "czTranscript": "Edward často používá slovník. Co dělá?", "expl": "'Uses the dictionary' = vyhledává slova ve slovníku → správná odpověď: d. looks up words.", "distractors": ["A. solves math problems — Slovník se nepoužívá na matematiku.", "B. draws maps — Slovník neslouží k mapám.", "C. reads electronics diagrams — Slovník neslouží k elektronice."]}, {"id": 11, "part": "I", "options": ["to meet his friend's plane", "on the civilian side", "by taxi", "to see the factory"], "correct": 0, "transcript": "Why did Sam go to the airport?", "czTranscript": "Proč Sam šel na letiště?", "expl": "Na letiště se chodí kvůli letadlům → správná odpověď: a. to meet his friend's plane.", "distractors": ["B. on the civilian side — Odpovídá na 'Kde?', ne 'Proč?'", "C. by taxi — Odpovídá na 'Jak?', ne 'Proč?'", "D. to see the factory — Továrna není na letišti."]}, {"id": 12, "part": "I", "options": ["three miles", "a high school", "a two-story building", "nine months"], "correct": 0, "transcript": "How far is it to the school?", "czTranscript": "Jak daleko je to do školy?", "expl": "Otázka 'How far?' se ptá na vzdálenost → správná odpověď: a. three miles.", "distractors": ["B. a high school — Popisuje typ školy, ne vzdálenost.", "C. a two-story building — Popisuje budovu, ne vzdálenost.", "D. nine months — Odpovídá na 'Jak dlouho?', ne 'Jak daleko?'"]}, {"id": 13, "part": "I", "options": ["factories", "animals", "schools", "reservations"], "correct": 1, "transcript": "Susan went to the zoo yesterday. What did she see there?", "czTranscript": "Susan včera šla do zoo. Co tam viděla?", "expl": "V zoo jsou zvířata (animals) → správná odpověď: b. animals.", "distractors": ["A. factories — Továrny nejsou v zoo.", "C. schools — Školy nejsou v zoo.", "D. reservations — Nesouvisí s zoo."]}, {"id": 14, "part": "I", "options": ["a fight", "a night", "a flight", "a light"], "correct": 2, "transcript": "John is planning for a long flight. What is he planning for?", "czTranscript": "John plánuje dlouhý let. Co plánuje?", "expl": "'Flight' = let (letadlem) → správná odpověď: c. a flight.", "distractors": ["A. a fight — Záměna: 'fight' vs. 'flight'.", "B. a night — Záměna: 'night' vs. 'flight'.", "D. a light — Záměna: 'light' vs. 'flight'."]}, {"id": 15, "part": "I", "options": ["the sheet", "the screen", "the shirt", "the sleeve"], "correct": 3, "transcript": "Mary doesn't like her jacket because one sleeve is too long. What is too long?", "czTranscript": "Mary nemá ráda svůj kabátek, protože jeden rukáv je příliš dlouhý. Co je příliš dlouhé?", "expl": "'One sleeve is too long' = jeden rukáv → správná odpověď: d. the sleeve.", "distractors": ["A. the sheet — Záměna zvukově podobných slov.", "B. the screen — Nesouvisí s kabátem.", "C. the shirt — Věta mluví o kabátku a rukávu, ne košili."]}, {"id": 16, "part": "I", "options": ["crowded", "seated", "empty", "half filled"], "correct": 0, "transcript": "The theater was loaded with people. How was the theater?", "czTranscript": "Divadlo bylo plné lidí. Jaké bylo?", "expl": "'Loaded with people' = plné lidí = přeplněné → správná odpověď: a. crowded.", "distractors": ["B. seated — Popisuje, že lidé sedí, ne míru přeplnění.", "C. empty — Přímý opak: 'loaded with people'.", "D. half filled — 'Loaded' = plné/přeplněné, ne z poloviny."]}, {"id": 17, "part": "I", "options": ["meek", "strong", "lazy", "disloyal"], "correct": 1, "transcript": "That woman can lift very heavy objects. How would you describe her?", "czTranscript": "Ta žena dokáže zdvihnout velmi těžké předměty. Jak byste ji popsali?", "expl": "Schopnost zdvihat těžké předměty = silná → správná odpověď: b. strong.", "distractors": ["A. meek — Pokora nesouvisí s fyzickou silou.", "C. lazy — Líný člověk by nezvedal těžké předměty.", "D. disloyal — Loajalita nesouvisí s fyzickou silou."]}, {"id": 18, "part": "I", "options": ["rough", "comfortable", "long", "hot"], "correct": 0, "transcript": "The trip was made over bumpy roads. What kind of roads were they?", "czTranscript": "Výlet byl po hrbolatých cestách. Jaké to byly cesty?", "expl": "'Bumpy roads' = hrbolaté = nerovné → správná odpověď: a. rough.", "distractors": ["B. comfortable — Hrbolaté cesty jsou nepohodlné, opak.", "C. long — Délka nesouvisí s hrbolatostí.", "D. hot — Teplota nesouvisí s povrchem cesty."]}, {"id": 19, "part": "I", "options": ["underwater", "on a tree", "on a vine", "underground"], "correct": 2, "transcript": "This fruit grows on a vine. Where does it grow?", "czTranscript": "Toto ovoce roste na révě. Kde roste?", "expl": "'Grows on a vine' = roste na révě. Odpověď je přímo ve větě → správná odpověď: c. on a vine.", "distractors": ["A. underwater — Réva neroste pod vodou.", "B. on a tree — Réva a strom jsou různé rostliny.", "D. underground — Réva roste na povrchu."]}, {"id": 20, "part": "I", "options": ["forty-eight", "eight", "seven", "six"], "correct": 3, "transcript": "My friend works every day except Sunday. How many days a week does he work?", "czTranscript": "Můj přítel pracuje každý den kromě neděle. Kolik dní v týdnu pracuje?", "expl": "7 dní v týdnu minus neděle = 6 dní → správná odpověď: d. six.", "distractors": ["A. forty-eight — To jsou hodiny, ne dny.", "B. eight — Týden má 7 dní, ne 8.", "C. seven — Pracuje všechny dny KROMĚ neděle = 6 dní."]}, {"id": hers' = bez pomoci ostatních → správná odpověď: b. with no assistance.", "distractors": ["A. with the cooperation of others — Opak: 'independently' = bez ostatních.", "C. without stopping — 'Independently' popisuje samostatnost, ne nepřetržitost.", "D. with consideration of others — Opak: 'independently' = bez ostatních."]}, {"id": 25, "part": "I", "options": ["one day after class", "two days after class", "before class", "during class"], "correct": 2, "transcript": "You should study your lesson in advance. When should you study your lesson?", "czTranscript": "Měli byste si lekci nastudovat předem. Kdy?", "expl": "'In advance' = předem = před hodinou → správná odpověď: c. before class.", "distractors": ["A. one day after class — 'In advance' = PŘED hodinou, ne po.", "B. two days after class — Opět po hodině.", "D. during class — 'In advance' = předem = před, ne během."]}, {"id": 26, "part": "II", "options": ["I listen to a tape.", "I hear a plane.", "I hear a car.", "I see a train."], "correct": 1, "transcript": "I hear an aircraft.", "czTranscript": "Slyším letadlo.", "expl": "'Aircraft' = letadlo. Synonymum: 'plane' → správná odpověď: b. I hear a plane.", "distractors": ["A. I listen to a tape. — 'Aircraft' nesouvisí s kazetou.", "C. I hear a car. — 'Aircraft' = letadlo, ne auto.", "D. I see a train. — 'Hear aircraft' = slyším letadlo, ne vidím vlak."]}, {"id": 27, "part": "II", "options": ["Don't hurry.", "Take ten cents.", "Take your tin cup.", "Take yours and mine."], "correct": 0, "transcript": "Take your time.", "czTranscript": "Nespěchejte.", "expl": "Idiom 'Take your time' = nespěchejte, dejte si čas → správná odpověď: a. Don't hurry.", "distractors": ["B. Take ten cents. — Záměna 'time' se zvukově podobným 'dime'.", "C. Take your tin cup. — Záměna 'time' s 'tin'.", "D. Take yours and mine. — Nesouvisí s idiomem."]}, {"id": 28, "part": "II", "options": ["I'm buying it.", "I'm sharing it.", "I'm preparing it.", "I'm comparing it."], "correct": 2, "transcript": "I'm making the coffee now.", "czTranscript": "Právě připravuji kávu.", "expl": "'Making the coffee' = připravuji kávu → správná odpověď: c. I'm preparing it.", "distractors": ["A. I'm buying it. — 'Making' = připravovat, ne kupovat.", "B. I'm sharing it. — 'Making' nesouvisí se sdílením.", "D. I'm comparing it. — 'Making' nesouvisí s porovnáváním."]}, {"id": 29, "part": "II", "options": ["He fell sick.", "He felt sick.", "He was sick when he fell.", "He found me sick."], "correct": 1, "transcript": "My friend felt sick yesterday.", "czTranscript": "Můj přítel se včera cítil nemocně.", "expl": "'Felt sick' = cítil se nemocně → správná odpověď: b. He felt sick.", "distractors": ["A. He fell sick. — 'Fall sick' = onemocnět náhle – jiný idiom.", "C. He was sick when he fell. — Záměna 'felt' (cítil) se 'fell' (upadl).", "D. He found me sick. — Záměna osoby a slovesa."]}, {"id": 30, "part": "II", "options": ["He was in training.", "He was becoming sick.", "He was bored.", "He was becoming tired."], "correct": 3, "transcript": "He was getting tired from walking all afternoon.", "czTranscript": "Unavoval se z chůze celé odpoledne.", "expl": "'Getting tired' = unavoval se (postupně). Synonymum: 'becoming tired' → správná odpověď: d. He was becoming tired.", "distractors": ["A. He was in training. — Chůze celého odpoledne neznamená trénink.", "B. He was becoming sick. — 'Tired' = unavený, ne nemocný.", "C. He was bored. — Nuda a únava jsou různé stavy."]}, {"id": 31, "part": "II", "options": ["One pencil is better.", "One pencil is smaller.", "The pencils are alike.", "The pencils are different."], "correct": 2, "transcript": "This pencil is like that one.", "czTranscript": "Tato tužka je jako tamta.", "expl": "'Like' = podobný, stejný. 'This pencil is like that one' = tužky jsou podobné → správná odpověď: c. The pencils are alike.", "distractors": ["A. One pencil is better. — 'Like' = podobné, ne jedna lepší.", "B. One pencil is smaller. — 'Like' = podobné = stejné.", "D. The pencils are different. — Přímý opak: 'like' = podobné."]}, {"id": 32, "part": "II", "options": ["I have influenza.", "I have something new.", "I was told what to do.", "I need to fly more."], "correct": 0, "transcript": "The doctor says I have the flu.", "czTranscript": "Doktor říká, že mám chřipku.", "expl": "'The flu' = chřipka = influenza → správná odpověď: a. I have influenza.", "distractors": ["B. I have something new. — Záměna 'flu' se zvukově podobným 'new'.", "C. I was told what to do. — Věta je o diagnóze, ne o doporučení.", "D. I need to fly more. — Záměna 'flu' se zvukově podobným 'fly'."]}, {"id": 33, "part": "II", "options": ["Jack enjoys fishing.", "Tom enjoys fishing.", "Tom doesn't fish for pleasure.", "Jack doesn't fish."], "correct": 1, "transcript": "Jack asked, \"Do you enjoy fishing?\" Tom replied, \"Yes. It is my favorite sport.\"", "czTranscript": "Jack se zeptal: 'Baví tě rybaření?' Tom odpověděl: 'Ano, je to můj oblíbený sport.'", "expl": "Tom řekl 'Yes, it is my favorite sport' = rybaření je jeho oblíbený sport → správná odpověď: b. Tom enjoys fishing.", "distractors": ["A. Jack enjoys fishing. — Jack se jen PTAL, Tom odpovídal.", "C. Tom doesn't fish for pleasure. — Opak: řekl, že je to jeho oblíbený sport.", "D. Jack doesn't fish. — Věta neříká nic o tom, zda Jack rybáří."]}, {"id": 34, "part": "II", "options": ["He bought the book.", "He taught the book.", "He looked for the book.", "He was thinking about buying it."], "correct": 3, "transcript": "He thought about buying the book.", "czTranscript": "Přemýšlel o koupi knihy.", "expl": "'Thought about buying' = uvažoval o koupi → správná odpověď: d. He was thinking about buying it.", "distractors": ["A. He bought the book. — 'Thought about buying' = uvažoval, ale nekoupil nutně.", "B. He taught the book. — Záměna 'thought' (přemýšlel) s 'taught' (vyučoval).", "C. He looked for the book. — Hledání a přemýšlení jsou různé věci."]}, {"id": 35, "part": "II", "options": ["It is flexible." y with the students.", "Your students may study."], "correct": 1, "transcript": "You must make your students study.", "czTranscript": "Musíte přimět své studenty studovat.", "expl": "'Make your students study' = přimět studenty studovat → správná odpověď: b. You must have the students study.", "distractors": ["A. You must study. — Věta říká, že STUDENTI musí studovat, ne vy.", "C. You must study with the students. — Přimět studenty ≠ studovat s nimi.", "D. Your students may study. — 'May' = povolení, ale věta říká 'must' = povinnost."]}, {"id": 46, "part": "II", "options": ["He is letting the students speak.", "He is lecturing.", "He is talking to the students.", "He is talking too much."], "correct": 0, "transcript": "The instructor is listening and not talking.", "czTranscript": "Instruktor poslouchá a nemluví.", "expl": "'Listening and not talking' = poslouchá a nemluví = studenti mluví → správná odpověď: a. He is letting the students speak.", "distractors": ["B. He is lecturing. — Přednáší = mluví, ale instruktor NEMLUVÍ.", "C. He is talking to the students. — Opak: věta říká 'not talking'.", "D. He is talking too much. — Opak: věta říká 'not talking'."]}, {"id": 47, "part": "II", "options": ["Joe could not go to the dentist.", "The dentist might visit Joe.", "Joe needs a new tooth.", "Joe should go to the dentist."], "correct": 3, "transcript": "Joe needs to visit a dentist for treatment of his tooth.", "czTranscript": "Joe potřebuje navštívit zubaře kvůli léčení zubu.", "expl": "'Needs to visit a dentist for treatment' = měl by jít k zubaři → správná odpověď: d. Joe should go to the dentist.", "distractors": ["A. Joe could not go to the dentist. — 'Needs to visit' = potřebuje jít, má možnost.", "B. The dentist might visit Joe. — Opačný směr: Joe má navštívit zubaře.", "C. Joe needs a new tooth. — Potřebuje léčení, ne nutně nový zub."]}, {"id": 48, "part": "II", "options": ["I have a business appointment.", "I have a social appointment.", "I have a medical appointment.", "I don't know the date today."], "correct": 1, "transcript": "I have a date with my girlfriend this afternoon.", "czTranscript": "Dnes odpoledne mám rande s přítelkyní.", "expl": "'Date with girlfriend' = rande = společenská schůzka → správná odpověď: b. I have a social appointment.", "distractors": ["A. I have a business appointment. — Rande s přítelkyní je osobní, ne obchodní.", "C. I have a medical appointment. — Rande nesouvisí s lékařem.", "D. I don't know the date today. — Záměna 'date' (rande) s 'date' (datum)."]}, {"id": 49, "part": "II", "options": ["He had mostly paper money.", "He had mostly coins.", "He had lots of money with him.", "He had very little money with him."], "correct": 3, "transcript": "He had hardly any money with him.", "czTranscript": "Měl u sebe sotva nějaké peníze.", "expl": "'Hardly any money' = sotva nějaké = velmi málo → správná odpověď: d. He had very little money with him.", "distractors": ["A. He had mostly paper money. — Druh peněz nesouvisí s jejich množstvím.", "B. He had mostly coins. — Druh peněz nesouvisí s jejich množstvím.", "C. He had lots of money with him. — Přímý opak 'hardly any'."]}, {"id": 50, "part": "II", "options": ["He will write twice on his trip.", "He would write twice a day.", "He would not write the second week.", "He promised to write two times each week."], "correct": 3, "transcript": "Tom said, \"I'll write twice a week on my trip.\"", "czTranscript": "Tom řekl: 'Budu psát dvakrát týdně na cestě.'", "expl": "'Twice a week' = dvakrát týdně → správná odpověď: d. He promised to write two times each week.", "distractors": ["A. He will write twice on his trip. — 'Twice a week' = dvakrát TÝDNĚ, ne celkem za cestu.", "B. He would write twice a day. — 'A week' = týdně, ne denně.", "C. He would not write the second week. — Věta nic takového neříká."]}, {"id": 51, "part": "III", "options": ["at twelve sharp", "in the shopping center", "to get a haircut", "to do some shopping"], "correct": 2, "transcript": "A: \"Where was Joe yesterday at noon?\" B: \"He went to the barbershop.\" Why did Joe go to the barbershop?", "czTranscript": "A: 'Kde byl Joe včera v poledne?' B: 'Šel do holičství.' Proč Joe šel do holičství?", "expl": "'Barbershop' = holičství, kde se stříhají vlasy → správná odpověď: c. to get a haircut.", "distractors": ["A. at twelve sharp — Odpovídá na 'Kdy?', ne 'Proč?'", "B. in the shopping center — Odpovídá na 'Kde?', ne 'Proč?'", "D. to do some shopping — V holičství se nenakupuje."]}, {"id": 52, "part": "III", "options": ["the commissary", "the non-commissioned officer's club", "the officer's club", "the PX"], "correct": 1, "transcript": "A: \"Sergeant Brown, where are you going?\" B: \"I'm going to the club for dinner.\" Where will Sergeant Brown eat?", "czTranscript": "A: 'Kam spěcháte, seržante?' B: 'Jdu do klubu na večeři.' Kde bude jíst?", "expl": "Seržant = poddůstojník (NCO). 'The club' pro seržanta = NCO club → správná odpověď: b. the non-commissioned officer's club.", "distractors": ["A. the commissary — Zásobovací sklad, neslouží k večeření.", "C. the officer's club — Seržant je poddůstojník, ne důstojník.", "D. the PX — Vojenský obchod, ne restaurace."]}, {"id": 53, "part": "III", "options": ["They will fly.", "this morning", "first-class", "They'll make reservations."], "correct": 0, "transcript": "A: \"Our friends are going to Chicago next month.\" B: \"Yes, they are going by jet plane.\" How will the friends get to Chicago?", "czTranscript": "A: 'Naši přátelé jedou do Chicaga.' B: 'Letí proudovým letadlem.' Jak se tam dostanou?", "expl": "'Going by jet plane' = poletí → správná odpověď: a. They will fly.", "distractors": ["B. this morning — Odpovídá na 'Kdy?', ne 'Jak?'", "C. first-class — Třída cestování není zmíněna.", "D. They'll make reservations. — Rezervace nesouvisí s způsobem dopravy."]}, {"id": 54, "part": "III", "options": ["1615", "1450", "1350", "1515"], "correct": 3, "transcript": "A: \"Where did Captain Murphy go?\" B: \"He has to report to the commandant at 315.\" When does the captain have to be there?", "czTranscript": "A: 'Kam šel kapitán Murphy?' B: 'Musí se hlásit veliteli ve 315.' Kdy tam musí být?", "expl": "'Report at 315' v kontextu denní služby = vojenský čas 1515 → správná odpověď: d. 1515.", "czEx": "V 15:15 (1515 vojenský čas).", "distractors": ["A. 1615 — Záměna 315 s 1615.", "B. 1450 — Žádná logická vazba na 315.", "C. 1350 — Žádná logická vazba na 315."]}, {"id": 55, "part": "III", "options": ["a star", "a rectangle", "a circle", "a wall"], "correct": 2, "transcript": "A: \"Have you noticed anything unusual about the moon tonight?\" B: \"Yes, there's a ring around it.\" What does the woman see?", "czTranscript": "A: 'Všimli jste si něčeho neobvyklého na měsíci?' B: 'Ano, je kolem něj kroužek.' Co vidí?", "expl": "'A ring around the moon' = kroužek/kruh = circle → správná odpověď: c. a circle.", "distractors": ["A. a star — Kroužek kolem měsíce není hvězda.", "B. a rectangle — Kroužek je kulatý, ne obdélníkový.", "D. a wall — 'Ring around it' = kroužek kolem, ne zeď."]}, {"id": 56, "part": "III", "options": ["It's warm.", "It's red.", "It's small.", "It's wool."], "correct": 1, "transcript": "A: \"How do you like Ann's new winter hat?\" B: \"It's nice, and it's the brightest red I've seen.\" What did the man say about the hat?", "czTranscript": "A: 'Jak se vám líbí Annin klobouk?' B: 'Je pěkný a je to nejjasnější červená, jakou jsem viděl.'", "expl": "'The brightest red I've seen' = nejjasnější červená = klobouk je červený → správná odpověď: b. It's red.", "distractors": ["A. It's warm. — Teplota klobouku není zmíněna.", "C. It's small. — Velikost klobouku není zmíněna.", "D. It's wool. — Materiál klobouku není zmíněn."]}, {"id": 57, "part": "III", "options": ["Don's son", "the wife of Don", "Don's daughter", "the girl Don will marry"], "correct": 3, "transcript": "A: \"Were Don's parents happy to meet his fiancée?\" B: \"Yes, they were delighted.\" Who were Don's parents glad to meet?", "czTranscript": "A: 'Byli Donovi rodiče rádi, že poznali jeho snoubenku?' B: 'Ano, byli potěšeni.'", "expl": "'Fiancée' = snoubenka = dívka, kterou si Don vezme → správná odpověď: d. the girl Don will marry.", "distractors": ["A. Don's son — Snoubenka je budoucí manželka, ne syn.", "B. the wife of Don — Snoubenka je zatím jen zaslíbená, ne manželka.", "C. Don's daughter — Snoubenka je jeho partnerka, ne dcera."]}, {"id": 58, "part": "III", "options": ["a good supply of fresh fish", "a good supply of copper and iron", "a good supply of wheat and vegetables", "a good supply of beef cattle and sheep"], "correct": 2, "transcript": "A: \"Are the crops going to be good this year?\" B: \"Yes, because we've had an excellent combination of rain and sunshine.\" What are they talking about?", "czTranscript": "A: 'Budou letos úrody dobré?' B: 'Ano, měli jsme výbornou kombinaci deště a slunce.'", "expl": "'Crops' = zemědělské plodiny (pšenice, zelenina). Déšť a slunce podporují rostliny → správná odpověď: c. a good supply of wheat and vegetables.", "distractors": ["A. a good supply of fresh fish — Ryby se nepěstují z deště a slunce.", "B. a good supply of copper and iron — Kovy se netěží díky dešti.", "D. a good supply of beef cattle and sheep — 'Crops' = plodiny, ne dobytek."]}, {"id": 59, "part": "III", "options": ["He caused the accident.", "He survived the accident.", "He avoided the accident.", "He died because of the accident."], "correct": 1, "transcript": "A: \"Did your friend live after his terrible traffic accident?\" B: \"I heard that he made it okay.\" What did the woman hear?", "czTranscript": "A: 'Přežil váš přítel strašnou nehodu?' B: 'Slyšela jsem, že to zvládl.'", "expl": "'He made it okay' = přežil, vyšel z toho v pořádku → správná odpověď: b. He survived the accident.", "distractors": ["A. He caused the accident. — 'Made it okay' neznamená způsobit nehodu.", "C. He avoided the accident. — Věta říká, že nehoda se stala.", "D. He died because of the accident. — Přímý opak: 'made it okay' = přežil."]}, {"id": 60, "part": "III", "options": ["She would not pay any attention.", "She would argue with him.", "She would follow his advice.", "She would wash her hair."], "correct": 0, "transcript": "A: \"What would you do if a friend said he didn't like the color of your hair?\" B: \"I would probably ignore him.\" What did the woman mean?", "czTranscript": "A: 'Co byste udělala, kdyby přítel řekl, že se mu nelíbí barva vlasů?' B: 'Pravděpodobně bych ho ignorovala.'", "expl": "'Ignore him' = nevšímat si ho = nevěnovat mu pozornost → správná odpověď: a. She would not pay any attention.", "distractors": ["B. She would argue with him. — 'Ignore' = nevšímat si, ne hádat se.", "C. She would follow his advice. — Opak: 'ignore' = nevšímat si.", "D. She would wash her hair. — 'Ignore' neznamená změnit barvu vlasů."]}, {"id": 61, "part": "IV", "stem": "The weather in Houston is humid. It is __________.", "options": ["damp", "cold", "dry", "windy"], "correct": 0, "expl": "Správná odpověď je a. damp. Celá věta zní: The weather in Houston is humid. It is damp. (Počasí v Houstonu je vlhké.) 'Humid' a 'damp' jsou synonyma – obě znamenají vlhký.<br>Proč ostatní možnosti nesedí:<br>• b. cold (studený) – teplota nesouvisí s vlhkostí.<br>• c. dry (suchý) – přímý opak vlhkého.<br>• d. windy (větrný) – vítr nesouvisí s vlhkostí."}, {"id": 62, "part": "IV", "stem": "Mary won't be here, and John won't be here __________.", "options": ["too", "neither", "likely", "either"], "correct": 3, "expl": "Správná odpověď je d. either. Celá věta zní: Mary won't be here, and John won't be here either. (Mary tady nebude a John tady také nebude.)<br>TOO vs. EITHER:<br>• TOO (taky) se používá v kladných větách: I like it, and she does too.<br>• EITHER (také ne) se používá v záporných větách: I don't like it, and she doesn't either.<br>Proč ostatní možnosti nesedí:<br>• a. too – 'too' se používá v kladných větách, ne záporných ('won't').<br>• b. neither – 'neither' stojí na začátku věty: 'Neither will John.' Ne na konci.<br>• c. likely – 'likely' = pravděpodobně – jiný smysl, nedává zde gramaticky smysl."}, {"id": 63, "part": "IV", "stem": "He is __________ working for that company.", "options": ["yet", "still", "rather", "soon"], "correct": 1, "expl": "Správná odpověď je b. still. Celá věta zní: He is still working for that company. (Stále pracuje pro tu společnost.) 'Still' vyjadřuje nepřetržité trvání děje.<br>STILL vs. YET:<br>• STILL (stále, pořád) – v kladných větách a otázkách, vyjadřuje pokračování: He is still here.<br>• YET (ještě, již) – v záporných větách a otázkách: He hasn't finished yet. / Has he finished yet?<br>Proč ostatní možnosti nesedí:<br>• a. yet – 'yet' se používá v záporech a otázkách, ne v kladných větách.<br>• c. rather – 'rather' = spíše, docela – jiný smysl.<br>• d. soon – 'soon' = brzy – vyjadřuje budoucnost, ne pokračující přítomnost."}, {"id": 64, "part": "IV", "stem": "He is flying better now than he __________ before.", "options": ["flyed", "flied", "flew", "flown"], "correct": 2, "expl": "Správná odpověď je c. flew. Celá věta zní: He is flying better now than he flew before. (Létá teď lépe než předtím.) Minulý čas od 'fly' je nepravidelný: fly – flew – flown.<br>Nepravidelné sloveso FLY:<br>• Přítomný čas: fly / flies<br>• Minulý čas: flew ✓<br>• Příčestí minulé: flown (have flown)<br>Proč ostatní možnosti nesedí:<br>• a. flyed – neexistuje; 'fly' je nepravidelné sloveso.<br>• b. flied – neexistuje; záměna s pravidelným slovesem.<br>• d. flown – příčestí minulé; používá se s 'have/has': 'he has flown', ne samotné."}, {"id": 65, "part": "IV", "stem": "A thermostat __________ the room temperature.", "options": ["regulates", "causes", "requires", "installs"], "correct": 0, "expl": "Správná odpověď je a. regulates. Celá věta zní: A thermostat regulates the room temperature. (Termostat reguluje teplotu v místnosti.) Termostat měří a udržuje teplotu na nastavené hodnotě.<br>Proč ostatní možnosti nesedí:<br>• b. causes (způsobuje) – termostat teplotu nezpůsobuje, řídí ji.<br>• c. requires (vyžaduje) – termostat nic nevyžaduje, měří a reguluje.<br>• d. installs (instaluje) – termostat se instaluje, ale sám nic neinstaluje."}, {"id": 66, "part": "IV", "stem": "Push the switch in, __________ you will damage the machine.", "options": ["otherwise", "since", "other words", "however"], "correct": 0, "expl": "Správná odpověď je a. otherwise. Celá věta zní: Push the switch in, otherwise you will damage the machine. (Stlačte přepínač, jinak stroj poškodíte.) 'Otherwise' = jinak, v opačném případě – vyjadřuje důsledek nesplnění podmínky.<br>Proč ostatní možnosti nesedí:<br>• b. since (protože/od) – vyjadřuje příčinu nebo čas, ne důsledek nesplnění podmínky.<br>• c. other words – 'in other words' = jinými slovy – jiný idiom, a navíc chybí 'in'.<br>• d. however (avšak) – vyjadřuje kontrast, ne varování o důsledku."}, {"id": 67, "part": "IV", "stem": "Hot air __________ from the ground.", "options": ["rising", "rise", "rises", "risen"], "correct": 2, "expl": "Správná odpověď je c. rises. Celá věta zní: Hot air rises from the ground. (Teplý vzduch stoupá od země.) Podmět 'hot air' je 3. osoba jednotného čísla → sloveso musí mít koncovku -s.<br>Přítomný prostý čas – 3. osoba jednotného čísla:<br>he/she/it → sloveso + -s: rises, goes, works<br>Hot air = it → rises ✓<br>Proč ostatní možnosti nesedí:<br>• a. rising – gerundium/příčestí; potřebuje pomocné sloveso: 'is rising'.<br>• b. rise – základní tvar bez -s; nesprávné pro 3. osobu jednotného čísla.<br>• d. risen – příčestí minulé; potřebuje pomocné sloveso: 'has risen'."}, {"id": 68, "part": "IV", "stem": "The Indians hunted buffalo, __________ spears for weapons.", "options": ["use", "using", "used", "were using"], "correct": 1, "expl": "Správná odpověď je b. using. Celá věta zní: The Indians hunted buffalo, using spears for weapons. (Indiáni lovili bizona a používali při tom oštěpy jako zbraně.) Participiální konstrukce 'using' vyjadřuje souběžný děj.<br>Participiální konstrukce s -ing:<br>Hlavní věta + , + příčestí přítomné (-ing)<br>Vyjadřuje děj probíhající současně s hlavním dějem.<br>Příklad: He sat by the fire, reading a book.<br>Proč ostatní možnosti nesedí:<br>• a. use – základní tvar; po čárce v participiální konstrukci se nepoužívá.<br>• c. used – minulý čas; tvoří druhou hlavní větu, ale logicky nedává smysl.<br>• d. were using – minulý průběhový čas; potřebuje podmět a je příliš těžkopádné."}, {"id": 69, "part": "IV", "stem": "I took my clothes off and put __________ my pajamas.", "options": ["on", "near", "with", "in"], "correct": 0, "expl": "Správná odpověď je a. on. Celá věta zní: I took my clothes off and put on my pajamas. (Svlékl jsem se a oblékl si pyžamo.) 'Put on' = obléct si – ustálená fráze.<br>Frázová slovesa s oblékáním:<br>• put on = obléct si (put on a shirt)<br>• take off = svléct si (take off your shoes)<br>• try on = vyzkoušet si (try on a dress)<br>Proč ostatní možnosti nesedí:<br>• b. near – 'put near' nedává smysl v kontextu oblékání.<br>• c. with – 'put with' nedává smysl.<br>• d. in – 'put in' = vložit dovnitř – jiný smysl než obléct si."}, {"id": 70, "part": "IV", "stem": "This new book has some interesting __________.", "options": ["times", "stairs", "stories", "prices"], "correct": 2, "expl": "Správná odpověď je c. stories. Celá věta zní: This new book has some interesting stories. (Tato nová kniha má několik zajímavých příběhů.) Kniha obsahuje příběhy (stories).<br>Proč ostatní možnosti nesedí:<br>• a. times (časy/doby) – kniha neobsahuje 'times' v tomto smyslu.<br>• b. stairs (schody) – schody jsou v budovách, ne v knihách.<br>• d. prices (ceny) – ceny jsou na štítcích, ne v obsahu knihy."}, {"id": 71, "part": "IV", "stem": "Frank enjoyed __________ at the new catalog.", "options": ["to look", "looked", "look", "looking"], "correct": 3, "expl": "Správná odpověď je d. looking. Celá věta zní: Frank enjoyed looking at the new catalog. (Frank si s radostí prohlížel nový katalog.)<br>Slovesa vyžadující gerundium (-ing):<br>enjoy, finish, mind, avoid, consider, suggest + gerundium<br>✓ enjoy looking / enjoy swimming / enjoy reading<br>✗ enjoy to look (chybné)<br>Proč ostatní možnosti nesedí:<br>• a. to look – infinitiv s 'to'; po 'enjoy' se nepoužívá.<br>• b. looked – minulý čas; po 'enjoyed' se sloveso v minulém čase nepoužívá.<br>• c. look – základní tvar; po 'enjoyed' se nepoužívá bez 'to'."}, {"id": 72, "part": "IV", "stem": "\"Will we have class tomorrow?\" \"No, we ___________\"", "options": ["will", "may", "wouldn't", "won't"], "correct": 3, "expl": "Správná odpověď je d. won't. Odpověď: No, we won't. (Ne, nebudeme.) Záporná krátká odpověď na 'Will we...?' musí používat 'won't' (= will not).<br>Krátké odpovědi s 'will':<br>• Kladná: Yes, we will.<br>• Záporná: No, we won't. ✓<br>Proč ostatní možnosti nesedí:<br>• a. will – kladná odpověď; ale otázka vyžaduje zápornou ('No').<br>• b. may – vyjadřuje možnost nebo povolení; neodpovídá na 'will'.<br>• c. wouldn't – podmiňovací způsob; nesouvisí s prostou zápornou odpovědí na 'will'."}, {"id": 73, "part": "IV", "stem": "\"Were the students in the classroom when the teacher came in?\" \"Yes, they were in the room when the teacher __________.\"", "options": ["left", "spoken", "entered", "called"], "correct": 2, "expl": "Správná odpověď je c. entered. Celá věta zní: Yes, they were in the room when the teacher entered. 'Came in' = vstoupil = 'entered'. Jsou to synonyma.<br>Proč ostatní možnosti nesedí:<br>• a. left (odešel) – opak vstupu; 'came in' = vstoupil, ne odešel.<br>• b. spoken (mluvil, příčestí) – nesouvisí s příchodem a gramaticky sem nepatří.<br>• d. called (zavolal) – zavolání a fyzický vstup jsou různé akce."}, {"id": 74, "part": "IV", "stem": "The owner of the restaurant was well known. He was __________.", "options": ["sad", "fat", "poor", "famous"], "correct": 3, "expl": "Správná odpověď je d. famous. Celá věta zní: The owner of the restaurant was well known. He was famous. 'Well known' = dobře známý = slavný. Synonymum: 'famous'.<br>Proč ostatní možnosti nesedí:<br>• a. sad (smutný) – smutek nesouvisí se slávou.<br>• b. fat (tlustý) – váha nesouvisí se slávou.<br>• c. poor (chudý) – bohatství nesouvisí se slávou."}, {"id": 75, "part": "IV", "stem": "This plane does not travel __________ that one.", "options": ["more faster than", "fast", "faster", "as fast as"], "correct": 3, "expl": "Správná odpověď je d. as fast as. Celá věta zní: This plane does not travel as fast as that one. (Toto letadlo necestuje tak rychle jako tamto.)<br>Záporné srovnání – stejná míra:<br>• not as + přídavné jméno/příslovce + as<br>✓ not as fast as, not as tall as, not as good as<br>Kladné srovnání stejné míry:<br>• as fast as, as tall as (stejně rychlý/vysoký)<br>Proč ostatní možnosti nesedí:<br>• a. more faster than – dvojitý komparativ; gramaticky chybný v angličtině.<br>• b. fast – bez srovnávací struktury; nedává smysl po 'does not travel'.<br>• c. faster – komparativ; v záporném srovnání stejné míry se nepoužívá samotný komparativ."}, {"id": 76, "part": "IV", "stem": "John went to Dallas by plane. He went ____________.", "options": ["with a plane", "by the plane", "on a plane", "to the plane"], "correct": 2, "expl": "Správná odpověď je c. on a plane. Celá věta zní: John went to Dallas by plane. He went on a plane. (John letěl do Dallasu letadlem.)<br>Způsob dopravy – předložky:<br>• by + dopravní prostředek (bez členu): by plane, by car, by train<br>• on a/the + dopravní prostředek: on a plane, on the bus, on a train<br>Obě varianty jsou správné, ale 'on a plane' je nejlepší parafráze 'went by plane'.<br>Proč ostatní možnosti nesedí:<br>• a. with a plane – 'with' = s; nepoužívá se pro způsob dopravy.<br>• b. by the plane – 'by' + způsob dopravy se píše BEZ členu: by plane (ne 'the plane').<br>• d. to the plane – 'went to the plane' = šel k letadlu – jiný smysl."}, {"id": 77, "part": "IV", "stem": "The post office is straight ahead. The post office is _________.", "options": ["to your left", "behind you", "very close", "in front of you"], "correct": 3, "expl": "Správná odpověď je d. in front of you. Celá věta zní: The post office is straight ahead. = The post office is in front of you. 'Straight ahead' = přímo před vámi.<br>Proč ostatní možnosti nesedí:<br>• a. to your left – vlevo od vás – 'straight ahead' = přímo vpřed, ne vlevo.<br>• b. behind you – za vámi – opak 'straight ahead'.<br>• c. very close – velmi blízko – vzdálenost není zmíněna, jen směr."}, {"id": 78, "part": "IV", "stem": "\"Listen! I think the telephone ____________.\"", "options": ["would ring", "rung", "was ringing", "is ringing"], "correct": 3, "expl": "Správná odpověď je d. is ringing. Celá věta zní: Listen! I think the telephone is ringing. (Poslouchejte! Myslím, že telefon zvoní.) 'Listen!' signalizuje přítomný okamžik → přítomný průběhový čas.<br>Přítomný průběhový čas (present continuous):<br>be + sloveso + -ing<br>Používá se pro děje probíhající PRÁVĚ TEĎ.<br>→ The telephone is ringing (právě teď zvoní).<br>Proč ostatní možnosti nesedí:<br>• a. would ring – podmiňovací způsob; nevyjadřuje přítomný okamžik.<br>• b. rung – příčestí minulé; potřebuje pomocné sloveso 'has rung'.<br>• c. was ringing – minulý průběhový čas; ale 'Listen!' signalizuje přítomnost."}, {"id": 79, "part": "IV", "stem": "Did you enjoy __________ all over the world?", "options": ["travel", "to travel", "traveling", "traveled"], "correct": 2, "expl": "Správná odpověď je c. traveling. Celá věta zní: Did you enjoy traveling all over the world? (Líbilo se vám cestovat po celém světě?)<br>Po slovese ENJOY vždy následuje gerundium (-ing):<br>✓ enjoy traveling / enjoy swimming / enjoy reading<br>✗ enjoy to travel (chybné)<br>Stejna pravidla: finish, mind, avoid, consider.<br>Proč ostatní možnosti nesedí:<br>• a. travel – základní tvar; po 'enjoy' se nepoužívá.<br>• b. to travel – infinitiv s 'to'; po 'enjoy' se nepoužívá.<br>• d. traveled – minulý čas; po 'enjoy' se nepoužívá."}, {"id": 80, "part": "IV", "stem": "If I had the money, I ____________ some new clothes now.", "options": ["buy", "will buy", "would buy", "had been buying"], "correct": 2, "expl": "Správná odpověď je c. would buy. Celá věta zní: If I had the money, I would buy some new clothes now. (Kdybych měl peníze, koupil bych si teď nové oblečení.)<br>2. kondicionál – nereálná podmínka v přítomnosti:<br>IF + minulý čas, ... WOULD + infinitiv<br>✓ If I had money, I would buy it.<br>✓ If she knew, she would tell us.<br>Vyjadřuje situaci, která NENÍ skutečností (ale mohla by být).<br>Proč ostatní možnosti nesedí:<br>• a. buy – přítomný čas; nepatří do 2. kondicionálu.<br>• b. will buy – 1. kondicionál (reálná podmínka): 'If I have money, I will buy...' – ale zde je podmínka nereálná.<br>• d. had been buying – předminulý průběhový; nepatří do 2. kondicionálu."}, {"id": 81, "part": "IV", "stem": "If something is wrong with your recorder, it is ____________.", "options": ["O.K.", "in good shape", "in bad condition", "not expensive"], "correct": 2, "expl": "Správná odpověď je c. in bad condition. Celá věta zní: If something is wrong with your recorder, it is in bad condition. 'Something is wrong' = něco je špatně = špatný stav.<br>Proč ostatní možnosti nesedí:<br>• a. O.K. – v pořádku – opak: 'something is wrong' = není v pořádku.<br>• b. in good shape – ve výborném stavu – opak špatného stavu.<br>• d. not expensive – není drahý – cena nesouvisí s tím, zda je něco v pořádku."}, {"id": 82, "part": "IV", "stem": "When you inflate an automobile tire, you ____________.", "options": ["remove the tire", "put air in it", "stop the leak", "change the tire"], "correct": 1, "expl": "Správná odpověď je b. put air in it. Celá věta zní: When you inflate a tire, you put air in it. 'Inflate' = nahuštit = naplnit vzduchem.<br>Proč ostatní možnosti nesedí:<br>• a. remove the tire – sejmout pneumatiku – opak nafukování.<br>• c. stop the leak – zastavit únik – opravování je jiná operace než nafukování.<br>• d. change the tire – vyměnit pneumatiku – výměna ≠ nafukování."}, {"id": 83, "part": "IV", "stem": "Robert told Mark to meet him at the drugstore at seven-fifteen. They will meet at ____________.", "options": ["a quarter after seven", "a quarter to eight", "half past seven", "seven sharp"], "correct": 0, "expl": "Správná odpověď je a. a quarter after seven. Celá věta zní: They will meet at a quarter after seven. 7:15 = čtvrt po sedmé = 'a quarter after seven'.<br>Čtení hodin v angličtině:<br>• 7:15 = a quarter after seven (BrE: a quarter past seven)<br>• 7:30 = half past seven<br>• 7:45 = a quarter to eight<br>• 7:00 = seven o'clock / seven sharp (přesně)<br>Proč ostatní možnosti nesedí:<br>• b. a quarter to eight – to je 7:45, ne 7:15.<br>• c. half past seven – to je 7:30, ne 7:15.<br>• d. seven sharp – přesně v 7:00, ne 7:15."}, {"id": 84, "part": "IV", "stem": "Mary said, \"Hold the phone.\" The person she was talking to _________.", "options": ["waited a minute", "took the telephone line", "put in another dime", "pressed down the receiver"], "correct": 0, "expl": "Správná odpověď je a. waited a minute. Celá věta zní: Hold the phone. = Počkejte chvilku (nezavěšujte). Idiom 'hold the phone' = počkejte, moment.<br>Proč ostatní možnosti nesedí:<br>• b. took the telephone line – nedává smysl jako reakce na 'hold the phone'.<br>• c. put in another dime – záměna s telefonní budkou (do které se vhazovaly mince).<br>• d. pressed down the receiver – stiskl přijímač = zavěsil – opak: 'hold the phone' = NEzavěšujte."}, {"id": 85, "part": "IV", "stem": "If you get a bargain, you __________.", "options": ["buy an item at a reduced price", "pay too much money for something", "buy poor merchandise", "buy better merchandise"], "correct": 0, "expl": "Správná odpověď je a. buy an item at a reduced price. 'Bargain' = výhodná koupě = koupíte za sníženou cenu.<br>Proč ostatní možnosti nesedí:<br>• b. pay too much money – přeplatíte – opak výhodné koupě.<br>• c. buy poor merchandise – kupujete špatné zboží – 'bargain' se týká ceny, ne kvality.<br>• d. buy better merchandise – kupujete lepší zboží – 'bargain' = výhodná cena, ne lepší kvalita."}, {"id": 86, "part": "IV", "stem": "Sometimes I go shopping.", "options": ["Usually", "Occasionally", "Seldom", "Often"], "correct": 1, "expl": "Správná odpověď je b. Occasionally. 'Sometimes' = občas, někdy. Synonymum: 'occasionally'.<br>Příslovce frekvence (od nejvyšší po nejnižší):<br>always (vždy) → usually (obvykle) → often (často) → sometimes/occasionally (občas) → seldom/rarely (zřídka) → never (nikdy)<br>Proč ostatní možnosti nesedí:<br>• a. Usually – obvykle – vyšší frekvence než 'sometimes'.<br>• c. Seldom – zřídka – nižší frekvence než 'sometimes'.<br>• d. Often – často – vyšší frekvence než 'sometimes'."}, {"id": 87, "part": "IV", "stem": "Harry performed his mission satisfactorily.", "options": ["pleasure", "situation", "assignment", "message"], "correct": 2, "expl": "Správná odpověď je c. assignment. Celá věta zní: Harry performed his assignment satisfactorily. 'Mission' = mise, úkol, zadání. Synonymum: 'assignment'.<br>Proč ostatní možnosti nesedí:<br>• a. pleasure (potěšení) – mise a potěšení jsou různé věci.<br>• b. situation (situace) – situace není totéž jako úkol/mise.<br>• d. message (zpráva) – zpráva ≠ mise."}, {"id": 88, "part": "IV", "stem": "The mechanic fixed Joe's car in one hour.", "options": ["He repaired the car.", "He looked over the car.", "He painted the car.", "He registered the car."], "correct": 0, "expl": "Správná odpověď je a. He repaired the car. Celá věta zní: The mechanic fixed Joe's car. = He repaired the car. 'Fixed' = opravil. Synonymum: 'repaired'.<br>Proč ostatní možnosti nesedí:<br>• b. He looked over the car. – Prohlédl auto – prohlídka ≠ oprava.<br>• c. He painted the car. – Natřel auto – natírání ≠ oprava.<br>• d. He registered the car. – Registroval auto – registrace ≠ oprava."}, {"id": 89, "part": "IV", "stem": "Can we arrange to be at her house by nine o'clock?", "options": ["Can we plan to be there by nine?", "Can we cancel his appointment?", "Can your friend be there by nine?", "Can you get a range at her house?"], "correct": 0, "expl": "Správná odpověď je a. Can we plan to be there by nine? 'Arrange' = zařídit, naplánovat. Synonymum: 'plan'.<br>Proč ostatní možnosti nesedí:<br>• b. Can we cancel his appointment? – Zrušit – opak plánování.<br>• c. Can your friend be there by nine? – Jiná osoba ('your friend', ne 'we').<br>• d. Can you get a range at her house? – Záměna 'arrange' se zvukově podobným 'a range' (sporák)."}, {"id": 90, "part": "IV", "stem": "Which word best describes the sun at 1200 hours on a clear day?", "options": ["dull", "bright", "cold", "hazy"], "correct": 1, "expl": "Správná odpověď je b. bright. 1200 hodin = poledne, jasný den = slunce jasně svítí = 'bright' (jasný, zářivý).<br>Proč ostatní možnosti nesedí:<br>• a. dull (mdlý, nevýrazný) – opak jasného slunce o poledni.<br>• c. cold (studený) – poledne v jasný den bývá teplé, ne studené.<br>• d. hazy (zamlžený, zatažený) – jasný den ('clear day') je opak zamlžení."}, {"id": 91, "part": "IV", "stem": "\"Will Alice have a vacation?\" \"____________\"", "options": ["Yes, she has.", "Yes, she did.", "Yes, she can.", "Yes, she will."], "correct": 3, "expl": "Správná odpověď je d. Yes, she will. Krátká odpověď na 'Will Alice...?' musí používat 'will'.<br>Krátké odpovědi – pomocné sloveso musí odpovídat:<br>• Will Alice...? → Yes, she will. / No, she won't.<br>• Has she...? → Yes, she has. / No, she hasn't.<br>• Did she...? → Yes, she did. / No, she didn't.<br>Proč ostatní možnosti nesedí:<br>• a. Yes, she has. – odpověď na 'Has she...?' (předpřítomný čas).<br>• b. Yes, she did. – odpověď na 'Did she...?' (minulý čas).<br>• c. Yes, she can. – odpověď na 'Can she...?' (schopnost/možnost)."}, {"id": 92, "part": "IV", "stem": "\"When does Charles study?\" \"__________\"", "options": ["Yes, he does.", "In his room.", "At night.", "With his friend."], "correct": 2, "expl": "Správná odpověď je c. At night. Otázka 'When?' se ptá na čas. Jediná odpověď udávající čas: 'At night' (večer/v noci).<br>Proč ostatní možnosti nesedí:<br>• a. Yes, he does. – yes/no odpověď; otázka 'when?' nevyžaduje ano/ne.<br>• b. In his room. – odpovídá na 'Where?' (kde).<br>• d. With his friend. – odpovídá na 'With whom?' (s kým)."}, {"id": 93, "part": "IV", "stem": "\"Have John and Mary gone to New York?\" \"__________\"", "options": ["Yes, they have.", "Yes, they go.", "Yes, they do.", "Yes, they must."], "correct": 0, "expl": "Správná odpověď je a. Yes, they have. Otázka 'Have they gone...?' = předpřítomný čas → krátká odpověď: 'Yes, they have.'<br>Proč ostatní možnosti nesedí:<br>• b. Yes, they go. – přítomný čas; neodpovídá na předpřítomný čas ('have gone').<br>• c. Yes, they do. – pomocné 'do' patří k přítomným časům, ne předpřítomným.<br>• d. Yes, they must. – 'must' = modalita; neodpovídá na otázku s 'have'."}, {"id": 94, "part": "IV", "stem": "\"Where can I get some medicine?\" \"__________\"", "options": ["At the drug store.", "You can if you're sick.", "No, I don't want any.", "I buy a lot of medicine."], "correct": 0, "expl": "Správná odpověď je a. At the drug store. Otázka 'Where?' se ptá na místo. Správná odpověď udává místo: 'At the drug store' (v lékárně).<br>Proč ostatní možnosti nesedí:<br>• b. You can if you're sick. – odpovídá na 'Can I...?' ne 'Where?'<br>• c. No, I don't want any. – záporná odpověď na 'Do you want...?' – nesouvisí.<br>• d. I buy a lot of medicine. – popisuje vlastní nákupy; neodpovídá na 'Where?'"}, {"id": 95, "part": "IV", "stem": "What should you do if you have a serious illness?", "options": ["go to town", "go on sick call", "try to cure yourself", "go to a movie"], "correct": 1, "expl": "Správná odpověď je b. go on sick call. 'Sick call' = vojenská lékařská prohlídka/ošetřovna. Při vážné nemoci je správný postup nahlásit se v ošetřovně.<br>Proč ostatní možnosti nesedí:<br>• a. go to town – jít do města – nesouvisí s léčbou nemoci.<br>• c. try to cure yourself – léčit se sám – při vážné nemoci je to nebezpečné.<br>• d. go to a movie – jít do kina – nesouvisí s nemocí."}, {"id": 96, "part": "IV", "stem": "\"Why did he call you?\" \"__________\"", "options": ["Yes, he did.", "Last night at 9:00.", "He calls me by my first name.", "Because he wanted me to study with him."], "correct": 3, "expl": "Správná odpověď je d. Because he wanted me to study with him. Otázka 'Why?' se ptá na důvod. Správná odpověď začíná 'Because...'<br>Proč ostatní možnosti nesedí:<br>• a. Yes, he did. – yes/no odpověď; otázka 'why?' nevyžaduje ano/ne.<br>• b. Last night at 9:00. – odpovídá na 'When?' (kdy).<br>• c. He calls me by my first name. – záměna 'call' (zavolat) s 'call someone by a name' (oslovovat)."}, {"id": 97, "part": "IV", "stem": "You would like to borrow a pencil. Which of the following is the correct request?", "options": ["Would I borrow your pencil?", "Must I borrow your pencil?", "May I borrow your pencil?", "Should I borrow your pencil?"], "correct": 2, "expl": "Správná odpověď je c. May I borrow your pencil? (Mohu si půjčit vaši tužku?) 'May I...?' je zdvořilá žádost o povolení.<br>Zdvořilé žádosti:<br>• May I...? = Mohu/Smím...? (žádost o povolení) ✓<br>• Can I...? = Mohu...? (méně formální)<br>• Could I...? = Mohl bych...? (ještě zdvořilejší)<br>Proč ostatní možnosti nesedí:<br>• a. Would I borrow...? – gramaticky chybné; 'would I' se takto nepoužívá pro žádost.<br>• b. Must I borrow...? – 'must' = musím (povinnost); nezní jako žádost, ale jako nutnost.<br>• d. Should I borrow...? – 'should' = měl bych; vyjadřuje spíše radu, ne žádost."}, {"id": 98, "part": "IV", "stem": "Which one of the following sentences is correct?", "options": ["My car is as old as yours.", "My car is yours old as.", "My car old is as yours.", "My car old as is yours."], "correct": 0, "expl": "Správná odpověď je a. My car is as old as yours. Celá věta zní: My car is as old as yours. (Moje auto je stejně staré jako tvoje.)<br>Srovnání stejné míry:<br>as + přídavné jméno + as<br>✓ as old as, as tall as, as fast as<br>Slovosled: podmět + sloveso + as + přídavné jméno + as + druhý člen<br>Proč ostatní možnosti nesedí:<br>• b. My car is yours old as. – chybný slovosled.<br>• c. My car old is as yours. – chybný slovosled; přídavné jméno musí být za slovesem 'is'.<br>• d. My car old as is yours. – chybný slovosled."}, {"id": 99, "part": "IV", "stem": "\"What places do you want to visit in the U.S.?\" \"__________\"", "options": ["Yes, I want to visit the U.S.", "Yes, I want to visit the U.S. next year.", "I want to learn English there.", "I want to visit New York and Chicago."], "correct": 3, "expl": "Správná odpověď je d. I want to visit New York and Chicago. Otázka 'What places?' se ptá na konkrétní místa. Správná odpověď uvádí konkrétní místa.<br>Proč ostatní možnosti nesedí:<br>• a. Yes, I want to visit the U.S. – yes/no odpověď; otázka 'what places?' nevyžaduje ano/ne. Navíc neuvádí konkrétní místa.<br>• b. Yes, I want to visit the U.S. next year. – stejný problém jako a.<br>• c. I want to learn English there. – odpovídá na 'What do you want to do?' ne 'What places?'"}, {"id": 100, "part": "IV", "stem": "\"Do we get on the bus at this corner?\" \"___________\"", "options": ["No, you can get on the bus at this corner.", "Yes, you get on the bus at this corner.", "Yes, I can't get a bus at this corner.", "Yes, he gets on the bus at the next corner."], "correct": 1, "expl": "Správná odpověď je b. Yes, you get on the bus at this corner. Odpověď 'Yes' potvrzuje tvrzení. Správná osoba ('you') a správné sloveso ('get on').<br>Proč ostatní možnosti nesedí:<br>• a. No, you can get on... – 'No' + kladná věta si odporují.<br>• c. Yes, I can't get... – 'Yes' + záporná věta si odporují.<br>• d. Yes, he gets on... at the next corner. – špatná osoba ('he' místo 'you') a špatné místo ('next corner')."}];

// ══════════════════════════════════════════════════════
//  BUILD HTML
// ══════════════════════════════════════════════════════
const LETTERS = ['A','B','C','D'];
const partInfo = {
  "I":  { label: "Část I — Poslech: Otázky (Q1–25)", first: 1 },
  "II": { label: "Část II — Poslech: Výroky (Q26–50)", first: 26 },
  "III":{ label: "Část III — Poslech: Dialogy (Q51–60)", first: 51 },
  "IV": { label: "Část IV — Čtení (Q61–100)", first: 61 },
};

const main = document.getElementById('mainContent');
let lastPart = null;

questions.forEach((q, idx) => {
  if (q.part !== lastPart) {
    const ph = document.createElement('div');
    ph.className = 'part-header';
    ph.textContent = partInfo[q.part].label;
    main.appendChild(ph);
    lastPart = q.part;
  }

  const row = document.createElement('div');
  row.className = 'q-row';
  row.id = 'q' + q.id;

  const optionsHtml = q.options.map((opt, i) => `
    <label class="q-option" id="opt_${q.id}_${i}" onclick="choose(${idx},${i})">
      <input type="radio" name="q${q.id}" value="${i}">
      <div class="opt-letter">${LETTERS[i]}</div>
      <div>${opt}</div>
    </label>
  `).join('');

  const stemHtml = q.stem
    ? `<div class="q-stem">${q.stem.replace(/_+/g,'<strong>_______</strong>')}</div>`
    : '';

  row.innerHTML = `
    <div class="q-inner">
      <div class="q-num">${q.id}</div>
      <div class="q-body">
        ${stemHtml}
        <div class="q-options">${optionsHtml}</div>
        <div class="q-explanation" id="expl_${q.id}">
          ${q.transcript ? `<em style="display:block;margin-bottom:6px;color:#4a5568;border-left:3px solid #94a3b8;padding-left:8px;font-style:italic;">${q.transcript}</em>` : ''}
          ${q.czTranscript ? `<span style="display:block;margin-bottom:8px;color:#1F4E79;font-size:0.78rem;padding-left:8px;">${q.czTranscript}</span>` : ''}
          <span style="color:#1a7a4a;">${q.expl}</span>
          ${q.distractors ? q.distractors.map(d => `<div style="margin-top:4px;font-size:0.75rem;"><span style="color:#b91c1c;font-weight:600;">${d}</span></div>`).join('') : ''}
        </div>
      </div>
    </div>
  `;
  main.appendChild(row);
});

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
const answers = new Array(100).fill(null);

function choose(idx, optIdx) {
  answers[idx] = optIdx;
  const q = questions[idx];
  // update visual
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById(`opt_${q.id}_${i}`);
    if (el) el.classList.toggle('chosen', i === optIdx);
  }
  // update count
  const n = answers.filter(a => a !== null).length;
  document.getElementById('answeredInfo').textContent = n + ' / 100 zodpovězeno';
}

// ══════════════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════════════
const audio = document.getElementById('audioEl');
let audioLoaded = true;

function loadAudio(input) {
  const file = input.files[0];
  if (!file) return;
  audio.src = URL.createObjectURL(file);
  audio.load();
  document.getElementById('uploadLabel').innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/></svg> ${file.name}`;
  audioLoaded = true;
  document.getElementById('playerStatus').textContent = 'Připraveno';
  audio.onended = () => {
    document.getElementById('playerStatus').textContent = 'Hotovo';
    document.getElementById('iconPlay').style.display = '';
    document.getElementById('iconPause').style.display = 'none';
  };
}

function togglePlay() {
  if (!audioLoaded) {
    document.getElementById('playerStatus').textContent = 'Nejprve nahrajte MP3';
    return;
  }
  if (audio.paused) {
    audio.play();
    document.getElementById('iconPlay').style.display = 'none';
    document.getElementById('iconPause').style.display = '';
    document.getElementById('playerStatus').textContent = 'Přehrávám';
  } else {
    audio.pause();
    document.getElementById('iconPlay').style.display = '';
    document.getElementById('iconPause').style.display = 'none';
    document.getElementById('playerStatus').textContent = 'Pozastaveno';
  }
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = audio.currentTime / audio.duration * 100;
  document.getElementById('progressPlayed').style.width = pct + '%';
  document.getElementById('playerTime').textContent =
    fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
});

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ══════════════════════════════════════════════════════
//  SUBMIT
// ══════════════════════════════════════════════════════
let submitted = false;

function trySubmit() {
  if (submitted) return;
  const unanswered = answers.filter(a => a === null).length;
  if (unanswered > 0) {
    const btn = document.getElementById('btnSubmit');
    btn.textContent = `${unanswered} nezodpovězených — odeslat i tak?`;
    btn.onclick = doSubmit;
    return;
  }
  doSubmit();
}

function doSubmit() {
  submitted = true;
  if (audio) audio.pause();

  // hide submit area
  document.getElementById('submitArea').style.display = 'none';

  // score
  const partRanges = {I:[0,24], II:[25,49], III:[50,59], IV:[60,99]};
  const partNames = {I:"Část I",II:"Část II",III:"Část III",IV:"Část IV"};
  let total = 0;
  const partScores = {};
  for (const [part, [s,e]] of Object.entries(partRanges)) {
    let c = 0;
    for (let i = s; i <= e; i++) if (answers[i] === questions[i].correct) c++;
    partScores[part] = { c, t: e-s+1 };
    total += c;
  }

  // show score banner
  const banner = document.getElementById('scoreBanner');
  banner.style.display = 'block';
  document.getElementById('scoreBig').innerHTML = total + '<span> / 100</span>';
  document.getElementById('scoreSub').textContent = Math.round(total) + '% správně';
  document.getElementById('scoreParts').innerHTML = Object.entries(partScores).map(([p,{c,t}]) =>
    `<div class="score-part"><div class="val">${c}/${t}</div><div class="lbl">${partNames[p]}</div></div>`
  ).join('');
  banner.scrollIntoView({behavior:'smooth'});

  // show result on each question
  questions.forEach((q, idx) => {
    const row = document.getElementById('q' + q.id);
    const userAns = answers[idx];
    const correct = q.correct;
    const isCorrect = userAns === correct;

    row.classList.add('show-result', isCorrect ? 'correct' : 'wrong');

    for (let i = 0; i < 4; i++) {
      const el = document.getElementById(`opt_${q.id}_${i}`);
      if (!el) continue;
      el.style.pointerEvents = 'none';
      if (i === correct) el.classList.add('show-correct');
      else if (i === userAns && !isCorrect) el.classList.add('show-wrong');
    }
  });
}

function retryTest() {
  location.reload();
}
</script>
