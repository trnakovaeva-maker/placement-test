<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALCPT Form 2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f2744;
    --navy-mid: #1a3a5c;
    --blue: #2563a8;
    --accent: #e8a020;
    --accent-light: #fdf3dc;
    --green: #1a7a4a;
    --green-light: #e8f7ef;
    --red: #b91c1c;
    --gray-100: #f4f6f9;
    --gray-200: #e5e9f0;
    --gray-400: #94a3b8;
    --gray-600: #4a5568;
    --gray-800: #1e293b;
    --white: #ffffff;
    --radius: 8px;
    --shadow: 0 2px 12px rgba(15,39,68,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--gray-100); color: var(--gray-800); }

  /* ── STICKY PLAYER ── */
  .player-bar {
    position: sticky;
    top: 0;
    z-index: 200;
    background: var(--navy);
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
    padding: 12px 24px;
  }
  .player-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .player-title {
    font-family: 'DM Serif Display', serif;
    color: var(--white);
    font-size: 1rem;
    white-space: nowrap;
  }
  .player-title span { color: var(--accent); }

  .player-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }
  .btn-playpause {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: var(--navy);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-playpause:hover { background: #d4911a; transform: scale(1.05); }
  .btn-playpause svg { width: 18px; height: 18px; fill: var(--navy); }

  .progress-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    position: relative;
    cursor: default;
  }
  .progress-played {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s linear;
    pointer-events: none;
  }
  .player-time {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .player-status {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }

  
  .upload-label:hover { background: rgba(255,255,255,0.18); }
  .upload-label input { display: none; }

  /* ── MAIN ── */
  .main {
    max-width: 800px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* ── PART HEADER ── */
  .part-header {
    margin: 32px 0 14px;
    padding: 10px 16px;
    background: var(--navy-mid);
    border-radius: var(--radius);
    color: var(--white);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    border-left: 4px solid var(--accent);
  }
  .part-header:first-child { margin-top: 0; }

  /* ── QUESTION ── */
  .q-row {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 8px;
    border-left: 3px solid var(--gray-200);
    transition: border-color 0.15s;
  }
  .q-row:focus-within { border-left-color: var(--blue); }

  .q-inner {
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 0;
  }
  .q-num {
    padding: 14px 0 14px 14px;
    font-weight: 700;
    font-size: 0.78rem;
    color: var(--gray-400);
    line-height: 1.6;
  }
  .q-body { padding: 14px 16px 14px 0; }
  .q-stem {
    font-size: 0.9rem;
    line-height: 1.55;
    color: var(--gray-800);
    margin-bottom: 10px;
  }
  .q-stem strong { color: var(--navy); }

  /* For audio questions — no stem shown, just options */
  .q-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .q-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1.5px solid var(--gray-200);
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--gray-700);
    transition: border-color 0.12s, background 0.12s;
    user-select: none;
  }
  .q-option:hover { border-color: var(--blue); background: #f0f6ff; }
  .q-option input[type=radio] { display: none; }
  .q-option.chosen { border-color: var(--blue); background: #eef5ff; }
  .q-option.chosen .opt-letter { background: var(--blue); color: var(--white); }
  .opt-letter {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--gray-200);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.7rem;
    color: var(--gray-600);
    flex-shrink: 0;
    transition: background 0.12s, color 0.12s;
  }

  /* ── RESULTS (hidden until submit) ── */
  .q-row.show-result.correct { border-left-color: var(--green); }
  .q-row.show-result.wrong { border-left-color: var(--red); }
  .q-option.show-correct { border-color: var(--green); background: var(--green-light); }
  .q-option.show-correct .opt-letter { background: var(--green); color: var(--white); }
  .q-option.show-wrong { border-color: var(--red); background: #fef2f2; }
  .q-option.show-wrong .opt-letter { background: var(--red); color: var(--white); }
  .q-explanation {
    display: none;
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--gray-100);
    border-radius: 6px;
    font-size: 0.8rem;
    line-height: 1.6;
    color: var(--gray-600);
    border-top: 1px solid var(--gray-200);
  }
  .q-explanation .cz-ex { color: var(--blue); font-weight: 600; display: block; margin-top: 3px; }
  .show-result .q-explanation { display: block; }

  /* ── SUBMIT / SCORE ── */
  .submit-area {
    text-align: center;
    margin-top: 36px;
  }
  .answered-info {
    font-size: 0.82rem;
    color: var(--gray-400);
    margin-bottom: 14px;
  }
  .btn-submit {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 13px 36px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--navy);
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .btn-submit:hover { background: #d4911a; transform: translateY(-1px); }

  .score-banner {
    display: none;
    background: var(--navy);
    color: var(--white);
    border-radius: 12px;
    padding: 28px 32px;
    margin-bottom: 28px;
    text-align: center;
  }
  .score-banner .big {
    font-family: 'DM Serif Display', serif;
    font-size: 3.5rem;
    color: var(--accent);
    line-height: 1;
  }
  .score-banner .big span { font-size: 1.6rem; color: rgba(255,255,255,0.4); }
  .score-banner .sub { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 6px; }
  .score-parts {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .score-part .val { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--white); }
  .score-part .lbl { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.4); }

  .btn-retry {
    margin-top: 16px;
    background: none;
    border: 2px solid var(--navy);
    border-radius: var(--radius);
    padding: 10px 24px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--navy);
    transition: all 0.15s;
  }
  .btn-retry:hover { background: var(--navy); color: var(--white); }

  @media (max-width: 560px) {
    .q-options { grid-template-columns: 1fr; }
    .player-title { display: none; }
  }
</style>
</head>
<body>

<!-- ── STICKY PLAYER ── -->
<div class="player-bar">
  <div class="player-inner">
    <div class="player-title">ALCPT <span>Form 2</span></div>
    <div class="player-controls">
      <button class="btn-playpause" id="btnPlay" onclick="togglePlay()" title="Play / Pause">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <div class="progress-track">
        <div class="progress-played" id="progressPlayed"></div>
      </div>
      <div class="player-time" id="playerTime">0:00 / 0:00</div>
      <div class="player-status" id="playerStatus">Připraveno</div>
    </div>
    
  </div>
</div>

<div class="main" id="mainContent">
  <!-- score banner (shown after submit) -->
  <div class="score-banner" id="scoreBanner">
    <div class="big" id="scoreBig"></div>
    <div class="sub" id="scoreSub"></div>
    <div class="score-parts" id="scoreParts"></div>
    <button class="btn-retry" onclick="retryTest()">Zkusit znovu</button>
  </div>
  <!-- questions injected here -->
</div>

<div class="submit-area" id="submitArea">
  <div class="answered-info" id="answeredInfo">0 / 100 zodpovězeno</div>
  <button class="btn-submit" id="btnSubmit" onclick="trySubmit()">Odeslat test ✓</button>
</div>

<audio id="audioEl" src="ALCPT02.MP3"></audio>

<script>
// ══════════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════════
const questions = [{"id": 1, "part": "I", "options": ["He wants to look at tiny particles.", "He wants to stop his vehicle.", "He wants to weigh something.", "He wants to rule people."], "correct": 2, "transcript": "Roger is going to use the scales. What does he want to do?", "czTranscript": "Roger se chystá použít váhy. Co chce udělat?", "expl": "'Scales' = váhy (na vážení) → správná odpověď: c. He wants to weigh something.", "distractors": ["A. He wants to look at tiny particles. — dívat se na malé částice", "B. He wants to stop his vehicle. — zastavit vozidlo", "D. He wants to rule people. — vládnout lidem"]}, {"id": 2, "part": "I", "options": ["a quarter of five", "fifteen numbers before four", "fifteen numbers before five", "a quarter past four"], "correct": 3, "transcript": "It is 4:15. What time is it?", "czTranscript": "Je 4:15. Kolik je hodin?", "expl": "4:15 = čtvrt pět = 'a quarter past four' → správná odpověď: d. a quarter past four.", "czExpl": "Ve 4:15 (čtvrt po čtyřech).", "distractors": ["A. a quarter to four — čtvrt na čtyři = 3:45", "B. four-thirty — 4:30 = půl páté", "C. a half past four — půl páté = 4:30"]}, {"id": 3, "part": "I", "options": ["forget his instructor", "contact his instructor", "remember his instructor", "touch his instructor"], "correct": 1, "transcript": "He wants to get in touch with his instructor. What does he want to do?", "czTranscript": "Chce se spojit se svým instruktorem. Co chce udělat?", "expl": "Idiom 'get in touch with' = kontaktovat → správná odpověď: b. contact his instructor.", "distractors": ["A. forget his instructor — zapomenout na instruktora", "C. remember his instructor — pamatovat si", "D. touch his instructor — dotknout se"]}, {"id": 4, "part": "I", "options": ["He wasn't sleepy.", "He wouldn't be able to sleep.", "He was sleepy.", "He couldn't sleep."], "correct": 2, "transcript": "Bill said that he felt sleepy. What did he say?", "czTranscript": "Bill řekl, že se cítí ospalý. Co řekl?", "expl": "'Felt sleepy' = cítil se ospalý → správná odpověď: c. He was sleepy.", "distractors": ["A. He wasn't sleepy. — nebyl ospalý (opak)", "C. He was sick. — byl nemocný", "D. He was hungry. — byl hladový"]}, {"id": 5, "part": "I", "options": ["right above his stomach", "below his stomach", "in his ankle", "in his foot"], "correct": 0, "transcript": "Donald has a pain in his chest. Where is the pain?", "czTranscript": "Donald má bolest v hrudi. Kde ho bolí?", "expl": "'Chest' = hrudník = oblast nad žaludkem → správná odpověď: a. right above his stomach.", "distractors": ["B. in his back — v zádech", "C. in his head — v hlavě", "D. in his foot — v noze"]}, {"id": 6, "part": "I", "options": ["colored", "washed", "cotton", "man-made"], "correct": 3, "transcript": "My shirt is made of synthetic fabric. What kind of fabric is it?", "czTranscript": "Moje košile je ze syntetické látky. Jaký druh látky to je?", "expl": "'Synthetic' = syntetický = umělý, člověkem vyrobený → správná odpověď: d. man-made.", "distractors": ["A. natural — přírodní (opak)", "B. cotton — bavlna (přírodní)", "C. lightweight — lehký"]}, {"id": 7, "part": "I", "options": ["tomorrow", "with George", "on Tuesday", "at the office"], "correct": 2, "transcript": "Today is Wednesday. Yesterday we went to town. When did we go?", "czTranscript": "Dnes je středa. Včera jsme jeli do města. Kdy jsme jeli?", "expl": "Den před středou (Wednesday) je úterý → správná odpověď: c. on Tuesday.", "distractors": ["A. on Monday — v pondělí", "B. on Wednesday — ve středu (= dnes, ne včera)", "D. on Thursday — ve čtvrtek"]}, {"id": 8, "part": "I", "options": ["at 1002", "at 1315", "at 1515", "at 1615"], "correct": 1, "transcript": "I have to be in the dentist's office at 1:15. When do I have to be there?", "czTranscript": "Musím být v zubařské ordinaci ve 1:15. Kdy tam musím být?", "expl": "1:15 odpoledne = vojenský čas 1315 → správná odpověď: b. at 1315.", "czExpl": "Ve 13:15 (1315 vojenský čas).", "distractors": ["A. at 0115 — 0115 = 1:15 ráno", "C. at 1515 — 15:15", "D. at 1615 — 16:15"]}, {"id": 9, "part": "I", "options": ["red", "wool", "leather", "small"], "correct": 0, "transcript": "What colour are her shoes?", "czTranscript": "Jakou barvu mají její boty?", "expl": "Otázka se ptá na barvu. Jediná barva mezi možnostmi → správná odpověď: a. red.", "distractors": ["B. leather — kožené (materiál)", "C. small — malé", "D. high heels — podpatky (styl)"]}, {"id": 10, "part": "I", "options": ["a blue gas", "several gases together", "exhaust vapors", "a compound"], "correct": 1, "transcript": "Air is a mixture of gases surrounding the earth. What is air?", "czTranscript": "Vzduch je směs plynů obklopující Zemi. Co je vzduch?", "expl": "'A mixture of gases' = směs plynů = několik plynů dohromady → správná odpověď: b. several gases together.", "distractors": ["A. a liquid — kapalina", "C. a solid — pevná látka", "D. a type of water — druh vody"]}, {"id": 11, "part": "I", "options": ["He eats a lot.", "He uses an encyclopedia.", "He has trouble finding things.", "He looks up the meanings of words."], "correct": 3, "transcript": "Edward often uses the dictionary. What does he often do?", "czTranscript": "Edward často používá slovník. Co často dělá?", "expl": "'Uses the dictionary' = vyhledává slova ve slovníku → správná odpověď: d. He looks up the meanings of words.", "distractors": ["A. He reads novels. — čte romány", "B. He studies grammar. — studuje gramatiku", "C. He solves puzzles. — řeší hádanky"]}, {"id": 12, "part": "I", "options": ["to get his suit pressed", "to have a drink", "to get a haircut", "to do some shopping"], "correct": 2, "transcript": "Joe is going to the barbershop. Why?", "czTranscript": "Joe jde do holičství. Proč?", "expl": "'Barbershop' = holičství = místo pro stříhání vlasů → správná odpověď: c. to get a haircut.", "distractors": ["A. to get a shave — oholit se", "B. to buy medicine — koupit lék", "D. to meet a friend — setkat se s přítelem"]}, {"id": 13, "part": "I", "options": ["take a rest", "bring his plane down", "take off", "fly faster"], "correct": 1, "transcript": "The pilot can land now. What can the pilot do?", "czTranscript": "Pilot teď může přistát. Co může pilot udělat?", "expl": "'Land' = přistát = přivést letadlo dolů → správná odpověď: b. bring his plane down.", "distractors": ["A. take a rest — odpočinout si", "C. take off — vzlétnout (opak)", "D. fly faster — letět rychleji"]}, {"id": 14, "part": "I", "options": ["There were reservations for three rooms.", "Three people were at the hotel.", "Three rooms were ready to be used.", "There were three checks at the hotel."], "correct": 2, "transcript": "The clerk said that there were only 3 rooms available at the hotel. What did the clerk mean?", "czTranscript": "Úředník řekl, že v hotelu jsou k dispozici jen 3 pokoje. Co tím myslel?", "expl": "'Available' = k dispozici, volné → správná odpověď: c. Three rooms were ready to be used.", "distractors": ["A. Three rooms were occupied. — obsazené (opak)", "B. Three rooms needed repairs. — potřebují opravy", "D. Three rooms were very small. — malé"]}, {"id": 15, "part": "I", "options": ["They are turning on the lights.", "They are turning the lights on and off.", "They are turning off the lights.", "They are watching the lights."], "correct": 1, "transcript": "Alfred said they're blinking the lights. What did he mean?", "czTranscript": "Alfred řekl, že světla blikají. Co tím myslel?", "expl": "'Blinking' = blikat = střídavě zapínat a vypínat → správná odpověď: b. They are turning the lights on and off.", "distractors": ["A. They are very bright. — jsou velmi jasná", "C. They are being replaced. — vyměňují se", "D. They are dim. — jsou mdlá"]}, {"id": 16, "part": "I", "options": ["put some money in the bank", "look at his account", "take money out of his account", "account for the cashier's money"], "correct": 0, "transcript": "The cashier told George he could open an account. What could George do?", "czTranscript": "Pokladník řekl  telephone line", "open the telephone book", "hang up the phone"], "correct": 0, "transcript": "A: \"Hello. Is Ruth there?\" B: \"Hold the phone.\" What does she want the man to do?", "czTranscript": "A: 'Haló. Je tam Ruth?' B: 'Počkejte.' Co chce, aby muž udělal?", "expl": "Idiom 'Hold the phone' = počkejte, nezavěšujte → správná odpověď: a. wait a minute.", "distractors": ["B. hang up — zavěsit (opak)", "C. call back later — zavolat zpět", "D. speak louder — mluvit hlasitěji"]}, {"id": 54, "part": "III", "options": ["eat a big meal", "drink something hot", "eat a piece of candy", "eat something light"], "correct": 0, "transcript": "A: \"Are you hungry?\" B: \"Yes. I'd like some dinner.\" What would the man like to do?", "czTranscript": "A: 'Máte hlad?' B: 'Ano, dal bych si večeři.' Co by muž rád udělal?", "expl": "'Dinner' = večeře = velké jídlo → správná odpověď: a. eat a big meal.", "distractors": ["B. have a snack — dát si svačinu", "C. drink something cold — vypít něco studeného", "D. eat something light — sníst něco lehkého"]}, {"id": 55, "part": "III", "options": ["the large room", "the wrong room", "the room on the left", "the correct room"], "correct": 3, "transcript": "A: \"Did you send the student to Mr. Johnson's office?\" B: \"Yes. I hope he went to the right room.\" Which room did she want the student to go to?", "czTranscript": "A: 'Poslal jsi studenta do kanceláře pana Johnsona?' B: 'Ano. Doufám, že šel do správné místnosti.' Co řekl?", "expl": "'I hope he went to the right room' = správná místnost → správná odpověď: d. the correct room.", "distractors": ["A. the right time — správný čas", "B. the right floor — správné patro", "C. the correct office — správná kancelář (blízká parafráze, ale d je přesnější)"]}, {"id": 56, "part": "III", "options": ["humidity", "atmospheric pressure", "temperature", "wind velocity"], "correct": 2, "transcript": "A: \"What are you looking for, Tim?\" B: \"A thermometer.\" What does he want to measure?", "czTranscript": "A: 'Co hledáš, Time?' B: 'Teploměr.' Co chce měřit?", "expl": "Teploměr ('thermometer') měří teplotu ('temperature') → správná odpověď: c. temperature.", "distractors": ["A. pressure — tlak (měří tlakoměr)", "B. humidity — vlhkost (měří vlhkoměr)", "D. weight — váha (měří váhy)"]}, {"id": 57, "part": "III", "options": ["He has a very good watch.", "He doesn't wear it.", "It doesn't keep good time.", "It is too tight."], "correct": 2, "transcript": "A: \"How do you like your watch?\" B: \"Its accuracy varies.\" What did he say about his watch?", "czTranscript": "A: 'Jak se ti líbí tvoje hodinky?' B: 'Jejich přesnost kolísá.' Co řekl o hodinkách?", "expl": "'Accuracy varies' = přesnost kolísá = neudává přesný čas → správná odpověď: c. It doesn't keep good time.", "distractors": ["A. It is a cheap watch. — je levné", "B. It needs a new battery. — potřebuje novou baterii", "D. It looks very nice. — vypadá hezky"]}, {"id": 58, "part": "III", "options": ["let the water run", "stop the flow of water", "make the water run more", "charge the faucet"], "correct": 1, "transcript": "A: \"What shall I do now?\" B: \"Turn off the faucet.\" What should the woman do?", "czTranscript": "A: 'Co mám teď dělat?' B: 'Zavřete kohoutek.' Co by žena měla udělat?", "expl": "'Turn off the faucet' = zavřít kohoutek = zastavit tok vody → správná odpověď: b. stop the flow of water.", "distractors": ["A. open the faucet — otevřít kohoutek (opak)", "C. fix the faucet — opravit kohoutek", "D. replace the faucet — vyměnit kohoutek"]}, {"id": 59, "part": "III", "options": ["windy", "hot and dry", "cool", "very damp"], "correct": 3, "transcript": "A: \"What kind of climate does your country have?\" B: \"We average about 80% humidity.\" What kind of climate does his country have?", "czTranscript": "A: 'Jaké má vaše země podnebí?' B: 'Průměrná vlhkost je asi 80%.' Jaké je podnebí?", "expl": "'80% humidity' = 80% vlhkost = velmi vlhké → správná odpověď: d. very damp.", "distractors": ["A. very dry — velmi suché (opak)", "B. very hot — velmi horké", "C. very cold — velmi studené"]}, {"id": 60, "part": "III", "options": ["in March", "in December", "every month", "in January"], "correct": 3, "transcript": "A: \"How is the weather where you are?\" B: \"We are having beautiful weather this February, but a month ago we had snow.\" When did they have snow?", "czTranscript": "A: 'Jaké je počasí u vás?' B: 'Máme krásné počasí v únoru, ale měsíc předtím jsme měli hodně sněhu.' Kdy sněžilo?", "expl": "Krásné počasí v únoru (February), sníh měsíc předtím = leden → správná odpověď: d. in January.", "distractors": ["A. in February — v únoru (v únoru je krásně)", "B. in March — v březnu (přichází po únoru)", "C. in December — v prosinci"]}, {"id": 61, "part": "IV", "stem": "The men _______ working on the project when the boss arrived.", "options": ["was", "has been", "were", "is"], "correct": 2, "expl": "Správná odpověď je c. were. Celá věta zní: The men were working on the project when the boss arrived. (Muži pracovali na projektu, když přišel šéf.) Podmět 'the men' je množné číslo → pomocné sloveso 'were' (minulý průběhový čas).<br>Minulý průběhový čas (past continuous):<br>was/were + sloveso + -ing<br>• jednotné číslo: I/he/she/it was working<br>• množné číslo: we/you/they were working ✓<br>Proč ostatní možnosti nesedí:<br>• a. was – Jednotné číslo; 'the men' je množné číslo.<br>• b. has been – Předpřítomný průběhový; nezapadá do kontextu minulého příchodu šéfa.<br>• d. is – Přítomný čas, jednotné číslo; nevhodné pro množné číslo v minulosti."}, {"id": 62, "part": "IV", "stem": "The students must _______ the examination.", "options": ["to pass", "passing", "pass", "passed"], "correct": 2, "expl": "Správná odpověď je c. pass. Celá věta zní: The students must pass the examination. (Studenti musí projít zkouškou.) Po modálním slovesu 'must' vždy následuje základní tvar slovesa (infinitiv bez 'to').<br>Po modálních slovesech vždy základní tvar (bez 'to'):<br>must, can, should, will, would, may, might + infinitiv bez 'to'<br>✓ must pass, can go, should study<br>✗ must to pass, must passing<br>Proč ostatní možnosti nesedí:<br>• a. to pass – Infinitiv s 'to'; po modálních slovesech se nepoužívá.<br>• b. passing – Gerundium/-ing tvar; po modálních slovesech se nepoužívá.<br>• d. passed – Minulý čas; po 'must' se nepoužívá."}, {"id": 63, "part": "IV", "stem": "The soldier is _______ his rifle.", "options": ["clean", "cleaning", "to clean", "cleaned"], "correct": 1, "expl": "Správná odpověď je b. cleaning. Celá věta zní: The soldier is cleaning his rifle. (Voják čistí svou pušku.) Přítomný průběhový čas: be + sloveso + -ing.<br>Přítomný průběhový čas (present continuous):<br>is/am/are + sloveso + -ing<br>✓ The soldier is cleaning...<br>Vyjadřuje děj probíhající právě teď.<br>Proč ostatní možnosti nesedí:<br>• a. clean – Základní tvar; po 'is' se nepoužívá (chybí -ing).<br>• c. to clean – Infinitiv s 'to'; po 'is' v průběhovém čase se nepoužívá.<br>• d. cleaned – Příčestí minulé; tvoří pasivum 'is cleaned', ale voják sám čistí = aktivní děj."}, {"id": 64, "part": "IV", "stem": "She doesn't have _______ money.", "options": ["some", "any", "many", "a few"], "correct": 1, "expl": "Správná odpověď je b. any. Celá věta zní: She doesn't have any money. (Nemá žádné peníze.) V záporné větě se 'some' nahrazuje 'any'.<br>SOME vs. ANY:<br>• SOME – kladné věty: She has some money.<br>• ANY – záporné věty a otázky: She doesn't have any money. / Does she have any money? ✓<br>• MANY – počitatelná jména: She doesn't have many books.<br>• A FEW – malé množství počitatelných: She has a few friends.<br>Proč ostatní možnosti nesedí:<br>• a. some – 'Some' se používá v kladných větách, ne záporných.<br>• c. many – 'Many' se používá s počitatelnými jmény; 'money' je nepočitatelné.<br>• d. a few – 'A few' se používá s počitatelnými jmény; 'money' je nepočitatelné."}, {"id": 65, "part": "IV", "stem": "John has been in the Army _______ 1985.", "options": ["for", "since", "in", "during"], "correct": 1, "expl": "Správná odpověď je b. since. Celá věta zní: John has been in the Army since 1985. (John je v armádě od roku 1985.) '1985' je konkrétní časový bod → 'since'.<br>FOR vs. SINCE:<br>• SINCE + konkrétní bod v minulosti: since 1985, since Monday ✓<br>• FOR + délka úseku: for ten years, for two months<br>Proč ostatní možnosti nesedí:<br>• a. for – 'For' vyžaduje délku trvání (for ten years), ne konkrétní rok.<br>• c. in – 'In' = v (roce); 'in 1985' popisuje dobu děje, ne trvání.<br>• d. during – 'During' = během – jiný kontext."}, {"id": 66, "part": "IV", "stem": "If I _______ rich, I would travel around the world.", "options": ["am", "was", "were", "have been"], "correct": 2, "expl": "Správná odpověď je c. were. Celá věta zní: If I were rich, I would travel around the world. (Kdybych byl bohatý, cestoval bych po světě.) 2. kondicionál – nereálná podmínka v přítomnosti.<br>2. kondicionál – nereálná podmínka v přítomnosti:<br>IF + were (pro všechny osoby), ... would + infinitiv<br>✓ If I were rich... / If she were here...<br>V hovorovém jazyce se 'was' také používá, ale 'were' je formálnější a správnější.<br>Proč ostatní možnosti nesedí:<br>• a. am – Přítomný čas; 2. kondicionál vyžaduje minulý tvar.<br>• b. was – Hovorová varianta; 'were' je gramaticky správnější ve 2. kondicionálu.<br>• d. have been – Předpřítomný čas; nepatří do 2. kondicionálu."}, {"id": 67, "part": "IV", "stem": "He said that he _______ come to the meeting.", "options": ["will", "would", "shall", "should"], "correct": 1, "expl": "Správná odpověď je b. would. Celá věta zní: He said that he would come to the meeting. (Řekl, že přijde na schůzku.) Nepřímá řeč – časová souslednost: 'will' se mění na 'would'.<br>Nepřímá řeč – časová souslednost:<br>Přímá řeč: He said, 'I will come.'<br>Nepřímá řeč: He said that he would come. ✓<br>Přítomný čas → minulý čas<br>will → would<br>Proč ostatní možnosti nesedí:<br>• a. will – Budoucí čas; v nepřímé řeči po minulém 'said' se mění na 'would'.<br>• c. shall – Formální budoucí čas; v nepřímé řeči po 'said' se mění na 'should'.<br>• d. should – Vyjadřuje doporučení; nemá stejný smysl jako budoucnost."}, {"id": 68, "part": "IV", "stem": "_______ does that soldier come from?", "options": ["What", "When", "Where", "Which"], "correct": 2, "expl": "Správná odpověď je c. Where. Celá věta zní: Where does that soldier come from? (Odkud je ten voják?) 'Come from' = být z, pocházet z → ptáme se na místo původu.<br>Proč ostatní možnosti nesedí:<br>• a. What – 'What' = co – neptáme se na věc, ale na místo.<br>• b. When – 'When' = kdy – neptáme se na čas, ale na místo.<br>• d. Which – 'Which' = který – výběr z nabídky, ne otázka na místo původu."}, {"id": 69, "part": "IV", "stem": "The sergeant told the private _______ immediately.", "options": ["reporting", "to report", "report", "reported"], "correct": 1, "expl": "Správná odpověď je b. to report. Celá věta zní: The sergeant told the private to report immediately. (Seržant řekl vojínovi, aby se okamžitě hlásil.) 'Tell + osoba + to + infinitiv' = říci někomu, aby něco udělal.<br>TELL + osoba + TO + infinitiv:<br>✓ told the private to report<br>✓ asked him to leave<br>✓ ordered them to stop<br>Tato vazba vyjadřuje příkaz nebo pokyn.<br>Proč ostatní možnosti nesedí:<br>• a. reporting – Gerundium; po 'tell + osoba' se nepoužívá.<br>• c. report – Základní tvar bez 'to'; po 'tell + osoba' musí být 'to'.<br>• d. reported – Minulý čas; po 'tell + osoba' se nepoužívá."}, {"id": 70, "part": "IV", "stem": "The recruits are _______ to the base.", "options": ["drive", "drove", "driven", "driving"], "correct": 3, "expl": "Správná odpověď je d. driving. Celá věta zní: The recruits are driving to the base. (Rekruti jedou autem na základnu.) Přítomný průběhový čas: are + sloveso + -ing.<br>Proč ostatní možnosti nesedí:<br>• a. drive – Základní tvar; po 'are' v průběhovém čase musí být -ing.<br>• b. drove – Minulý čas; nevhodné pro přítomný průběhový čas.<br>• c. driven – Příčestí minulé; tvoří pasivum 'are driven', ale rekruti sami jedou = aktivní děj."}, {"id": 71, "part": "IV", "stem": "He is one of the best soldiers _______ ever served in this unit.", "options": ["who have", "who has", "which has", "that have"], "correct": 0, "expl": "Správná odpověď je a. who have. Celá věta zní: He is one of the best soldiers who have ever served in this unit. (Je jedním z nejlepších vojáků, kteří kdy sloužili v této jednotce.) 'Soldiers' = množné číslo → 'who have'.<br>Vztažné věty s 'one of the...':<br>One of the best soldiers WHO HAVE served...<br>Odkaz na 'soldiers' (množné číslo) → have (množné číslo)<br>(Ne: who has – to by odkazovalo na 'one')<br>Proč ostatní možnosti nesedí:<br>• b. who has – Jednotné číslo; vztažná věta odkazuje na 'soldiers' (množné číslo).<br>• c. which has – 'Which' se používá pro věci, ne osoby; navíc jednotné číslo.<br>• d. that have – 'That' lze použít, ale 'who' je vhodnější pro osoby."}, {"id": 72, "part": "IV", "stem": "_______ do you prefer, coffee or tea?", "options": ["What", "Which", "Who", "Where"], "correct": 1, "expl": "Správná odpověď je b. Which. Celá věta zní: Which do you prefer, coffee or tea? (Čemu dáváte přednost, kávě nebo čaji?) 'Which' se používá při výběru z omezené nabídky.<br>WHAT vs. WHICH:<br>• WHICH – výběr z omezené nabídky (coffee or tea) ✓<br>• WHAT – obecná otázka bez omezené nabídky (What would you like to drink?)<br>Proč ostatní možnosti nesedí:<br>• a. What – 'What' = co – bez omezené nabídky; zde je nabídka konkrétní (coffee or tea).<br>• c. Who – 'Who' = kdo – pro osoby, ne nápoje.<br>• d. Where – 'Where' = kde – místo, ne výběr."}, {"id": 73, "part": "IV", "stem": "The general _______ the troops to advance.", "options": ["ordered", "suggested", "said", "told to"], "correct": 0, "expl": "Správná odpověď je a. ordered. Celá věta zní: The general ordered the troops to advance. (Generál nařídil vojákům postupovat.) 'Order + osoba + to + infinitiv' = nařídil.<br>Proč ostatní možnosti nesedí:<br>• b. suggested – 'Suggest' se pojí s gerundiem nebo that-větou: 'suggested advancing' / 'suggested that they advance'.<br>• c. said – 'Say' nevyžaduje osobu jako objekt; správně: 'said to the troops' nebo 'told the troops'.<br>• d. told to – Chybný tvar; správně: 'told the troops to advance'."}, {"id": 74, "part": "IV", "stem": "The mission was accomplished _______ any casualties.", "options": ["with", "without", "by", "for"], "correct": 1, "expl": "Správná odpověď je b. without. Celá věta zní: The mission was accomplished without any casualties. (Mise byla splněna bez jakýchkoli obětí.) 'Without' = bez.<br>Proč ostatní možnosti nesedí:<br>• a. with – 'With casualties' = s oběťmi – opak zamýšleného smyslu.<br>• c. by – 'By' = pomocí/prostřednictvím – jiná předložka.<br>• d. for – 'For' = pro/na – jiná předložka, nedává smysl."}, {"id": 75, "part": "IV", "stem": "She asked me _______ I had seen the commander.", "options": ["that", "what", "if", "which"], "correct": 2, "expl": "Správná odpověď je c. if. Celá věta zní: She asked me if I had seen the commander. (Zeptala se mě, zda jsem viděl velitele.) Nepřímá otázka s yes/no odpovědí → 'if' nebo 'whether'.<br>Nepřímé otázky:<br>• yes/no otázky → if/whether: She asked if I had seen him.<br>• doplňovací otázky → tázací slovo: She asked where I had been.<br>Proč ostatní možnosti nesedí:<br>• a. that – 'That' uvozuje oznamovací vedlejší větu, ne otázku.<br>• b. what – 'What' by fungovalo jen s doplňovací otázkou: 'asked what I had seen'.<br>• d. which – 'Which' = který – výběr z nabídky, ne nepřímá yes/no otázka."}, {"id": 76, "part": "IV", "stem": "The officer walked _______ the building.", "options": ["to", "into", "in", "inside"], "correct": 1, "expl": "Správná odpověď je b. into. Celá věta zní: The officer walked into the building. (Důstojník vešel do budovy.) 'Walk into' = vejít dovnitř – pohyb z venku dovnitř.<br>INTO vs. IN:<br>• INTO – pohyb Z VENKU DOVNITŘ: walked into the building ✓<br>• IN – umístění uvnitř: was working in the building (byl uvnitř)<br>Proč ostatní možnosti nesedí:<br>• a. to – 'Walked to the building' = šel K budově (ale nevešel dovnitř).<br>• c. in – 'Walked in the building' = procházel SE uvnitř budovy (byl již uvnitř).<br>• d. inside – 'Walked inside the building' – méně přirozené; 'into' je správná předložka pro vstup."}, {"id": 77, "part": "IV", "stem": "The troops are _______ to leave at 0600.", "options": ["order", "ordering", "ordered", "orders"], "correct": 2, "expl": "Správná odpověď je c. ordered. Celá věta zní: The troops are ordered to leave at 0600. (Vojáci mají rozkaz odejít ve 0600.) Pasivní tvar: 'are ordered to' = mají rozkaz.<br>Proč ostatní možnosti nesedí:<br>• a. order – Základní tvar nebo podstatné jméno; po 'are' v pasivu musí být příčestí minulé.<br>• b. ordering – Průběhový tvar; 'are ordering' = aktivní průběhový čas, ale vojáci nedávají rozkazy sami sobě.<br>• d. orders – Přítomný čas 3. osoby nebo množné podstatné jméno; po 'are' nesprávné."}, {"id": 78, "part": "IV", "stem": "He didn't study, _______ he failed the test.", "options": ["so", "but", "or", "for"], "correct": 0, "expl": "Správná odpověď je a. so. Celá věta zní: He didn't study, so he failed the test. (Nestudoval, a proto neuspěl u zkoušky.) 'So' = a proto, tedy – vyjadřuje důsledek.<br>Souřadné spojky:<br>• so = a proto (důsledek) ✓<br>• but = ale (kontrast)<br>• or = nebo (alternativa)<br>• for = neboť (příčina – formální)<br>• and = a (přidání)<br>Proč ostatní možnosti nesedí:<br>• b. but – 'But' = ale – vyjadřuje kontrast, ne důsledek.<br>• c. or – 'Or' = nebo – vyjadřuje alternativu.<br>• d. for – 'For' ve smyslu 'neboť' je velmi formální a zastarávající; 'so' je přirozenější."}, {"id": 79, "part": "IV", "stem": "The commander has _______ the battle plan.", "options": ["approve", "approving", "approved", "to approve"], "correct": 2, "expl": "Správná odpověď je c. approved. Celá věta zní: The commander has approved the battle plan. (Velitel schválil bojový plán.) Předpřítomný čas: have/has + příčestí minulé.<br>Předpřítomný čas (present perfect):<br>have/has + příčestí minulé<br>✓ has approved, have finished, has seen<br>Proč ostatní možnosti nesedí:<br>• a. approve – Základní tvar; po 'has' musí být příčestí minulé.<br>• b. approving – Gerundium/-ing tvar; po 'has' musí být příčestí minulé.<br>• d. to approve – Infinitiv s 'to'; po 'has' se nepoužívá."}, {"id": 80, "part": "IV", "stem": "The soldiers were told to _______ their weapons.", "options": ["cleaned", "cleaning", "clean", "cleans"], "correct": 2, "expl": "Správná odpověď je c. clean. Celá věta zní: The soldiers were told to clean their weapons. (Vojáci dostali pokyn vyčistit zbraně.) 'Be told to + infinitiv' = dostat pokyn, aby.<br>TELL + osoba + TO + infinitiv:<br>• were told to clean ✓<br>• was ordered to report<br>• was asked to wait<br>Po 'to' vždy základní tvar (infinitiv bez 'to').<br>Proč ostatní možnosti nesedí:<br>• a. cleaned – Příčestí minulé; po 'to' se nepoužívá.<br>• b. cleaning – Gerundium/-ing tvar; po 'to' se nepoužívá.<br>• d. cleans – Přítomný čas 3. osoby; po 'to' se nepoužívá."}, {"id": 81, "part": "IV", "stem": "_______ of the soldiers completed the training?", "options": ["How much", "How many", "How often", "How long"], "correct": 1, "expl": "Správná odpověď je b. How many. Celá věta zní: How many of the soldiers completed the training? (Kolik vojáků dokončilo výcvik?) 'Soldiers' = počitatelné podstatné jméno → 'how many'.<br>HOW MANY vs. HOW MUCH:<br>• HOW MANY + počitatelná jména: soldiers, books, days ✓<br>• HOW MUCH + nepočitatelná jména: money, time, water<br>Proč ostatní možnosti nesedí:<br>• a. How much – 'Soldiers' je počitatelné; 'how much' se používá s nepočitatelnými jmény.<br>• c. How often – 'How often' = jak často – frekvence, ne počet.<br>• d. How long – 'How long' = jak dlouho – délka trvání, ne počet."}, {"id": 82, "part": "IV", "stem": "The base is _______ from the city.", "options": ["far away", "long away", "much away", "great away"], "correct": 0, "expl": "Správná odpověď je a. far away. Celá věta zní: The base is far away from the city. (Základna je daleko od města.) 'Far away' = daleko – ustálená fráze.<br>Proč ostatní možnosti nesedí:<br>• b. long away – Neexistující fráze; 'long' = dlouhý/dlouho (čas), ne vzdálenost.<br>• c. much away – Neexistující fráze; 'much' se takto nepoužívá pro vzdálenost.<br>• d. great away – Neexistující fráze; 'great' se takto nepoužívá pro vzdálenost."}, {"id": 83, "part": "IV", "stem": "The report must be _______ by tomorrow.", "options": ["finish", "finishing", "finished", "to finish"], "correct": 2, "expl": "Správná odpověď je c. finished. Celá věta zní: The report must be finished by tomorrow. (Zpráva musí být hotova do zítřka.) Pasivní tvar s modálním slovesem: must be + příčestí minulé.<br>Pasivum s modálními slovesy:<br>must/should/can + be + příčestí minulé<br>✓ must be finished, should be done, can be completed<br>Proč ostatní možnosti nesedí:<br>• a. finish – Základní tvar; po 'be' v pasivu musí být příčestí minulé.<br>• b. finishing – Průběhový tvar; 'must be finishing' = průběhový čas, ne pasivum.<br>• d. to finish – Infinitiv; po 'must be' se nepoužívá v pasivu."}, {"id": 84, "part": "IV", "stem": "He speaks English _______ than his brother.", "options": ["good", "best", "more better", "better"], "correct": 3, "expl": "Správná odpověď je d. better. Celá věta zní: He speaks English better than his brother. (Mluví anglicky lépe než jeho bratr.) 'Than' signalizuje komparativ. Komparativ od 'well/good' je 'better'.<br>Stupňování GOOD/WELL:<br>• 1. stupeň: good / well<br>• 2. stupeň (komparativ): better + than ✓<br>• 3. stupeň (superlativ): best + of all<br>Proč ostatní možnosti nesedí:<br>• a. good – 1. stupeň; bez 'than' nelze srovnávat.<br>• b. best – Superlativ (3. stupeň); používá se s 'of all', ne s 'than'.<br>• c. more better – Dvojitý komparativ; gramaticky chybný v angličtině."}, {"id": 85, "part": "IV", "stem": "The _______ of the airplane was 500 miles per hour.", "options": ["speed", "color", "weight", "length"], "correct": 0, "expl": "Správná odpověď je a. speed. Celá věta zní: The speed of the airplane was 500 miles per hour. (Rychlost letadla byla 500 mil za hodinu.) 'Miles per hour' = jednotka rychlosti → 'speed'.<br>Proč ostatní možnosti nesedí:<br>• b. color – Barva – nepopisuje se v mílích za hodinu.<br>• c. weight – Hmotnost – nepopisuje se v mílích za hodinu.<br>• d. length – Délka – nepopisuje se v mílích za hodinu."}, {"id": 86, "part": "IV", "stem": "The soldiers had to _______ the river before dawn.", "options": ["crossed", "cross", "crossing", "crosses"], "correct": 1, "expl": "Správná odpověď je b. cross. Celá věta zní: The soldiers had to cross the river before dawn. (Vojáci museli přejít řeku před svítáním.) Po 'had to' následuje základní tvar slovesa (infinitiv bez 'to').<br>HAD TO + základní tvar:<br>✓ had to cross, had to leave, had to report<br>Have/has/had to + infinitiv bez 'to' = muset (minulá povinnost)<br>Proč ostatní možnosti nesedí:<br>• a. crossed – Minulý čas; po 'had to' se nepoužívá.<br>• c. crossing – Gerundium/-ing tvar; po 'had to' se nepoužívá.<br>• d. crosses – Přítomný čas 3. osoby; po 'had to' se nepoužívá."}, {"id": 87, "part": "IV", "stem": "_______ you please repeat that?", "options": ["Will", "May", "Could", "Should"], "correct": 2, "expl": "Správná odpověď je c. Could. Celá věta zní: Could you please repeat that? (Mohl byste to prosím zopakovat?) 'Could you...?' je zdvořilá prosba.<br>Zdvořilé prosby:<br>• Could you...? – velmi zdvořilé ✓<br>• Can you...? – méně formální<br>• Would you...? – zdvořilé<br>• Will you...? – méně zdvořilé (spíše příkaz)<br>Proč ostatní možnosti nesedí:<br>• a. Will – 'Will you repeat' = spíše příkaz než zdvořilá prosba.<br>• b. May – 'May you repeat' – nesprávná struktura; 'may' se takto nepoužívá pro prosby.<br>• d. Should – 'Should you repeat' – vyjadřuje povinnost, ne zdvořilou prosbu."}, {"id": 88, "part": "IV", "stem": "The enemy _______ the position at dawn.", "options": ["attacks", "attacked", "attacking", "to attack"], "correct": 1, "expl": "Správná odpověď je b. attacked. Celá věta zní: The enemy attacked the position at dawn. (Nepřítel zaútočil na pozici za úsvitu.) 'At dawn' = za úsvitu = konkrétní minulý moment → minulý prostý čas.<br>Proč ostatní možnosti nesedí:<br>• a. attacks – Přítomný čas; věta popisuje minulou událost ('at dawn').<br>• c. attacking – Gerundium; bez pomocného slovesa nedává smysl.<br>• d. to attack – Infinitiv; nedává bez kontextu smysl jako přísudek."}, {"id": 89, "part": "IV", "stem": "He has been promoted _______ the rank of sergeant.", "options": ["in", "by", "to", "for"], "correct": 2, "expl": "Správná odpověď je c. to. Celá věta zní: He has been promoted to the rank of sergeant. (Byl povýšen do hodnosti seržanta.) 'Promote to' = povýšit do – ustálená předložková vazba.<br>Proč ostatní možnosti nesedí:<br>• a. in – 'Promoted in the rank' – nesprávná předložka.<br>• b. by – 'Promoted by' = povýšen někým (kým) – jiný smysl.<br>• d. for – 'Promoted for' = povýšen za (zásluhy) – jiný smysl."}, {"id": 90, "part": "IV", "stem": "The unit will _______ at the designated area.", "options": ["assembled", "assembling", "assemble", "assembles"], "correct": 2, "expl": "Správná odpověď je c. assemble. Celá věta zní: The unit will assemble at the designated area. (Jednotka se shromáždí v určené oblasti.) Po 'will' následuje základní tvar slovesa (infinitiv bez 'to').<br>WILL + základní tvar slovesa:<br>✓ will assemble, will report, will leave<br>Budoucí čas vždy: will + infinitiv bez 'to'<br>Proč ostatní možnosti nesedí:<br>• a. assembled – Minulý čas/příčestí; po 'will' se nepoužívá.<br>• b. assembling – Gerundium/-ing tvar; po 'will' se nepoužívá.<br>• d. assembles – Přítomný čas 3. osoby; po 'will' se nepoužívá."}, {"id": 91, "part": "IV", "stem": "_______ the rain, the soldiers continued their march.", "options": ["Despite", "Although", "Because", "Since"], "correct": 0, "expl": "Správná odpověď je a. Despite. Celá věta zní: Despite the rain, the soldiers continued their march. (Přes déšť vojáci pokračovali v pochodu.) 'Despite' = navzdory + podstatné jméno.<br>DESPITE vs. ALTHOUGH:<br>• Despite + podstatné jméno/gerundium: Despite the rain ✓<br>• Although + věta: Although it was raining, they continued.<br>Obě vyjadřují kontrast, ale jiná gramatická struktura.<br>Proč ostatní možnosti nesedí:<br>• b. Although – 'Although' vyžaduje větu (podmět + sloveso): 'Although it rained'.<br>• c. Because – 'Because' = protože – vyjadřuje příčinu, ne kontrast.<br>• d. Since – 'Since' = protože/od – příčina nebo čas, ne kontrast."}, {"id": 92, "part": "IV", "stem": "The aircraft was flying _______ the clouds.", "options": ["above", "under", "into", "inside"], "correct": 0, "expl": "Správná odpověď je a. above. Celá věta zní: The aircraft was flying above the clouds. (Letadlo letělo nad mraky.) 'Above' = nad, výše než.<br>Proč ostatní možnosti nesedí:<br>• b. under – Pod – opak: 'above' = nad.<br>• c. into – 'Flying into the clouds' = letět DO mraků – jiný smysl.<br>• d. inside – 'Flying inside the clouds' – neobvyklé; 'above' je přirozenější pro letadlo nad mraky."}, {"id": 93, "part": "IV", "stem": "He _______ the map before the mission.", "options": ["studies", "is studying", "studied", "has studies"], "correct": 2, "expl": "Správná odpověď je c. studied. Celá věta zní: He studied the map before the mission. (Studoval mapu před misí.) 'Before the mission' = konkrétní minulý moment → minulý prostý čas.<br>Proč ostatní možnosti nesedí:<br>• a. studies – Přítomný čas; věta popisuje minulou událost.<br>• b. is studying – Přítomný průběhový; věta popisuje minulost.<br>• d. has studies – 'Has studies' je gramaticky chybné; správně by bylo 'has studied'."}, {"id": 94, "part": "IV", "stem": "The mission requires _______ attention to detail.", "options": ["care", "careful", "carefully", "caring"], "correct": 1, "expl": "Správná odpověď je b. careful. Celá věta zní: The mission requires careful attention to detail. (Mise vyžaduje pečlivou pozornost k detailům.) 'Careful' je přídavné jméno, které rozvíjí podstatné jméno 'attention'.<br>Slovní druhy:<br>• careful (přídavné jméno) – rozvíjí podstatné jméno: careful attention ✓<br>• carefully (příslovce) – rozvíjí sloveso: He worked carefully.<br>• care (podstatné jméno/sloveso) – Take care. / He cares.<br>• caring (přídavné jméno) – soucitný<br>Proč ostatní možnosti nesedí:<br>• a. care – Podstatné jméno nebo sloveso; 'care attention' nedává smysl.<br>• c. carefully – Příslovce; rozvíjí slovesa, ne podstatná jména.<br>• d. caring – 'Caring attention' – méně přirozené; 'careful' je správná kolokace."}, {"id": 95, "part": "IV", "stem": "The lieutenant is responsible _______ the platoon.", "options": ["of", "for", "to", "about"], "correct": 1, "expl": "Správná odpověď je b. for. Celá věta zní: The lieutenant is responsible for the platoon. (Poručík je zodpovědný za četu.) Ustálená předložková vazba: 'responsible for' = zodpovědný za.<br>Proč ostatní možnosti nesedí:<br>• a. of – 'Responsible of' – nesprávná předložka.<br>• c. to – 'Responsible to someone' = zodpovědný vůči někomu (nadřízenému) – jiný smysl.<br>• d. about – 'Responsible about' – nesprávná předložka."}, {"id": 96, "part": "IV", "stem": "They have been training _______ six months.", "options": ["since", "for", "during", "in"], "correct": 1, "expl": "Správná odpověď je b. for. Celá věta zní: They have been training for six months. (Trénují už šest měsíců.) 'Six months' = délka časového úseku → 'for'.<br>FOR vs. SINCE:<br>• FOR + délka úseku: for six months, for two years ✓<br>• SINCE + konkrétní bod: since January, since 2020<br>Proč ostatní možnosti nesedí:<br>• a. since – 'Since' vyžaduje konkrétní bod v čase (since January), ne délku trvání.<br>• c. during – 'During' = během – jiný kontext.<br>• d. in – 'In six months' = za šest měsíců (budoucnost) – jiný smysl."}, {"id": 97, "part": "IV", "stem": "The orders were _______ by the captain.", "options": ["give", "giving", "given", "gave"], "correct": 2, "expl": "Správná odpověď je c. given. Celá věta zní: The orders were given by the captain. (Rozkazy vydal kapitán.) Pasivum: were + příčestí minulé.<br>Pasivum (trpný rod):<br>be + příčestí minulé<br>✓ were given, was done, is completed<br>Pasivum se tvoří z příčestí minulého, ne ze základního nebo -ing tvaru.<br>Proč ostatní možnosti nesedí:<br>• a. give – Základní tvar; po 'were' v pasivu musí být příčestí minulé.<br>• b. giving – Průběhový tvar; 'were giving' = aktivní průběhový čas.<br>• d. gave – Minulý čas aktivní; nesouvisí s pasivem."}, {"id": 98, "part": "IV", "stem": "He is _______ soldier in the regiment.", "options": ["the tall", "the taller", "the tallest", "the most tall"], "correct": 2, "expl": "Správná odpověď je c. the tallest. Celá věta zní: He is the tallest soldier in the regiment. (Je nejvyšší voják v pluku.) 'In the regiment' = srovnávám ze skupiny → superlativ (3. stupeň).<br>Stupňování jednoslabičných přídavných jmen:<br>• 1. stupeň: tall<br>• 2. stupeň (komparativ): taller + than<br>• 3. stupeň (superlativ): the tallest + in/of ✓<br>Klíčové slovo: 'in the regiment' → superlativ.<br>Proč ostatní možnosti nesedí:<br>• a. the tall – 1. stupeň; bez srovnání.<br>• b. the taller – 2. stupeň (komparativ); pro srovnání dvou osob + 'than'.<br>• d. the most tall – Chybný superlativ; jednoslabičná slova tvoří superlativ příponou -est, ne 'most'."}, {"id": 99, "part": "IV", "stem": "The patrol will depart _______ further notice.", "options": ["after", "until", "by", "when"], "correct": 1, "expl": "Správná odpověď je b. until. Celá věta zní: The patrol will depart until further notice. (Hlídka neodejde do dalšího rozkazu.) 'Until further notice' = do dalšího upozornění/rozkazu – ustálená fráze.<br>Ustálená vojenská/úřední fráze:<br>• until further notice = do dalšího upozornění/rozkazu<br>Používá se pro rozkazy a instrukce platné do odvolání.<br>Proč ostatní možnosti nesedí:<br>• a. after – 'After further notice' = po dalším upozornění – jiný smysl.<br>• c. by – 'By further notice' – nesprávná předložka pro tuto frázi.<br>• d. when – 'When further notice' – gramaticky chybné."}, {"id": 100, "part": "IV", "stem": "The soldiers _______ their weapons every day.", "options": ["maintain", "maintains", "maintaining", "maintained"], "correct": 0, "expl": "Správná odpověď je a. maintain. Celá věta zní: The soldiers maintain their weapons every day. (Vojáci udržují své zbraně každý den.) 'The soldiers' = množné číslo, přítomný prostý čas → 'maintain' (bez -s).<br>Přítomný prostý čas:<br>• 3. osoba jednotného čísla (he/she/it): maintain-s<br>• ostatní osoby (I/you/we/they/the soldiers): maintain (bez -s) ✓<br>Proč ostatní možnosti nesedí:<br>• b. maintains – 3. osoba jednotného čísla; 'the soldiers' je množné číslo.<br>• c. maintaining – Gerundium/-ing; potřebuje pomocné sloveso: 'are maintaining'.<br>• d. maintained – Minulý čas; věta mluví o každodenní přítomné aktivitě ('every day')."}];

// ══════════════════════════════════════════════════════
//  BUILD HTML
// ══════════════════════════════════════════════════════
const LETTERS = ['A','B','C','D'];
const partInfo = {
  "I":  { label: "Část I — Poslech: Otázky (Q1–25)", first: 1 },
  "II": { label: "Část II — Poslech: Výroky (Q26–50)", first: 26 },
  "III":{ label: "Část III — Poslech: Dialogy (Q51–60)", first: 51 },
  "IV": { label: "Část IV — Čtení (Q61–100)", first: 61 },
};

const main = document.getElementById('mainContent');
let lastPart = null;

questions.forEach((q, idx) => {
  if (q.part !== lastPart) {
    const ph = document.createElement('div');
    ph.className = 'part-header';
    ph.textContent = partInfo[q.part].label;
    main.appendChild(ph);
    lastPart = q.part;
  }

  const row = document.createElement('div');
  row.className = 'q-row';
  row.id = 'q' + q.id;

  const optionsHtml = q.options.map((opt, i) => `
    <label class="q-option" id="opt_${q.id}_${i}" onclick="choose(${idx},${i})">
      <input type="radio" name="q${q.id}" value="${i}">
      <div class="opt-letter">${LETTERS[i]}</div>
      <div>${opt}</div>
    </label>
  `).join('');

  const stemHtml = q.stem
    ? `<div class="q-stem">${q.stem.replace(/_+/g,'<strong>_______</strong>')}</div>`
    : '';

  row.innerHTML = `
    <div class="q-inner">
      <div class="q-num">${q.id}</div>
      <div class="q-body">
        ${stemHtml}
        <div class="q-options">${optionsHtml}</div>
        <div class="q-explanation" id="expl_${q.id}">
          ${q.transcript ? `<em style="display:block;margin-bottom:6px;color:#4a5568;border-left:3px solid #94a3b8;padding-left:8px;font-style:italic;">${q.transcript}</em>` : ''}
          ${q.czTranscript ? `<span style="display:block;margin-bottom:8px;color:#1F4E79;font-size:0.78rem;padding-left:8px;">${q.czTranscript}</span>` : ''}
          <span style="color:#1a7a4a;">${q.expl}</span>
          ${q.distractors ? q.distractors.map(d => `<div style="margin-top:4px;font-size:0.75rem;"><span style="color:#b91c1c;font-weight:600;">${d}</span></div>`).join('') : ''}
        </div>
      </div>
    </div>
  `;
  main.appendChild(row);
});

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
const answers = new Array(100).fill(null);

function choose(idx, optIdx) {
  answers[idx] = optIdx;
  const q = questions[idx];
  // update visual
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById(`opt_${q.id}_${i}`);
    if (el) el.classList.toggle('chosen', i === optIdx);
  }
  // update count
  const n = answers.filter(a => a !== null).length;
  document.getElementById('answeredInfo').textContent = n + ' / 100 zodpovězeno';
}

// ══════════════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════════════
const audio = document.getElementById('audioEl');
let audioLoaded = true;

function loadAudio(input) {
  const file = input.files[0];
  if (!file) return;
  audio.src = URL.createObjectURL(file);
  audio.load();
  document.getElementById('uploadLabel').innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/></svg> ${file.name}`;
  audioLoaded = true;
  document.getElementById('playerStatus').textContent = 'Připraveno';
  audio.onended = () => {
    document.getElementById('playerStatus').textContent = 'Hotovo';
    document.getElementById('iconPlay').style.display = '';
    document.getElementById('iconPause').style.display = 'none';
  };
}

function togglePlay() {
  if (!audioLoaded) {
    document.getElementById('playerStatus').textContent = 'Nejprve nahrajte MP3';
    return;
  }
  if (audio.paused) {
    audio.play();
    document.getElementById('iconPlay').style.display = 'none';
    document.getElementById('iconPause').style.display = '';
    document.getElementById('playerStatus').textContent = 'Přehrávám';
  } else {
    audio.pause();
    document.getElementById('iconPlay').style.display = '';
    document.getElementById('iconPause').style.display = 'none';
    document.getElementById('playerStatus').textContent = 'Pozastaveno';
  }
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = audio.currentTime / audio.duration * 100;
  document.getElementById('progressPlayed').style.width = pct + '%';
  document.getElementById('playerTime').textContent =
    fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
});

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ══════════════════════════════════════════════════════
//  SUBMIT
// ══════════════════════════════════════════════════════
let submitted = false;

function trySubmit() {
  if (submitted) return;
  const unanswered = answers.filter(a => a === null).length;
  if (unanswered > 0) {
    const btn = document.getElementById('btnSubmit');
    btn.textContent = `${unanswered} nezodpovězených — odeslat i tak?`;
    btn.onclick = doSubmit;
    return;
  }
  doSubmit();
}

function doSubmit() {
  submitted = true;
  if (audio) audio.pause();

  // hide submit area
  document.getElementById('submitArea').style.display = 'none';

  // score
  const partRanges = {I:[0,24], II:[25,49], III:[50,59], IV:[60,99]};
  const partNames = {I:"Část I",II:"Část II",III:"Část III",IV:"Část IV"};
  let total = 0;
  const partScores = {};
  for (const [part, [s,e]] of Object.entries(partRanges)) {
    let c = 0;
    for (let i = s; i <= e; i++) if (answers[i] === questions[i].correct) c++;
    partScores[part] = { c, t: e-s+1 };
    total += c;
  }

  // show score banner
  const banner = document.getElementById('scoreBanner');
  banner.style.display = 'block';
  document.getElementById('scoreBig').innerHTML = total + '<span> / 100</span>';
  document.getElementById('scoreSub').textContent = Math.round(total) + '% správně';
  document.getElementById('scoreParts').innerHTML = Object.entries(partScores).map(([p,{c,t}]) =>
    `<div class="score-part"><div class="val">${c}/${t}</div><div class="lbl">${partNames[p]}</div></div>`
  ).join('');
  banner.scrollIntoView({behavior:'smooth'});

  // show result on each question
  questions.forEach((q, idx) => {
    const row = document.getElementById('q' + q.id);
    const userAns = answers[idx];
    const correct = q.correct;
    const isCorrect = userAns === correct;

    row.classList.add('show-result', isCorrect ? 'correct' : 'wrong');

    for (let i = 0; i < 4; i++) {
      const el = document.getElementById(`opt_${q.id}_${i}`);
      if (!el) continue;
      el.style.pointerEvents = 'none';
      if (i === correct) el.classList.add('show-correct');
      else if (i === userAns && !isCorrect) el.classList.add('show-wrong');
    }
  });
}

function retryTest() {
  location.reload();
}
</script>
